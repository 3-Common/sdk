name: add-sdk-resource
description: |
  Add a new resource (a product domain) to all three 3Common
  SDKs (Node, Python, and Go) from the canonical OpenAPI spec, and open a
  stack of draft PRs.
  Use when: the user asks to add / wrap / scaffold a new SDK resource or domain,
  e.g. "add the <name> resource", "wrap the <domain> endpoints in the SDK".
  Does: verifies the spec is current with origin/main, slices it to the target
  domain, implements Node first as the reference SDK (its types are generated
  from the spec, so it anchors the contract), derives the shared cross-language
  conformance scenarios from that verified Node implementation, gets human
  approval on the resulting API surface + scenarios, then implements Python and
  Go in parallel against those scenarios, validates each against the CI gates,
  and opens a stacked set of draft PRs - one per language plus a top conformance
  PR - layered main <- node <- python <- go <- conformance. The shared
  conformance scenarios land last (the top PR) because they activate every
  language's conformance suite at once, so they require all three implementations
  to already be present.
  NOT for: editing the OpenAPI spec, releasing/publishing packages, or
  modifying an existing resource.

provider: claude
# The AI nodes set their own model below (per-node overrides). This workflow
# default only applies to AI nodes that don't override (currently none, since
# the deterministic bash/script nodes ignore it).
# Pin explicit versions everywhere (primary + fallback) for reproducibility;
# bump deliberately to adopt a newer model.
model: claude-sonnet-4-6

# Approval gate => must run interactive so the gate reaches the user.
interactive: true

# This workflow writes code, so always isolate in a worktree (reject --no-worktree).
worktree:
  enabled: true

# CONVENTION for bash/script nodes: each body is handed to the shell as one
# command-line argument, which Windows truncates at ~8 KB (a longer script is
# silently cut mid-run, so a later step never executes yet the node exits 0).
# Keep every `bash:`/`script:` body lean: put general "why" rationale in YAML `#`
# comments ABOVE the node (free -- they live outside the block scalar and never
# reach the shell), and keep only short, line-specific notes inline. The node
# headers below follow this pattern.
#
# CONVENTION 2 - fail-fast diagnostics go to STDERR, not stdout. When a node
# exits non-zero, Archon surfaces the node's STDERR as the failure reason; when
# stderr is empty it falls back to leaking the leftover script body (only the
# first line of "Command failed: bash -c <body>" is stripped, so a multi-line
# body re-appears as the "diagnostic" -- see formatSubprocessFailure in
# Archon's executor-shared.ts). So every `echo` that precedes an `exit 1` (or a
# `return 1` that leads to one) MUST be redirected to stderr: `... >&2` for a
# single line, `{ ...; } >&2` for a block. Messages on the SUCCESS path (a
# warning that continues, a "nothing to publish" exit 0, the final status line)
# stay on stdout -- they are the node's output and must not trip the success-path
# stderr handler that echoes any stderr back to the user.
nodes:
  # -- 0. Preflight - fail fast (before any AI cost) if host prerequisites are
  # missing, instead of dying cryptically deep inside a validate node after the
  # expensive implementation. Checks tool presence + gh auth; reports everything
  # missing at once. Tools the workflow assumes are installed on the host.
  #
  # Why check the Yarn major version: the repo is Yarn 1 Classic and validate-node
  # runs `yarn install --frozen-lockfile`, a flag REMOVED in Yarn Berry (4.x). A
  # Berry host would pass the `have yarn` check, then die in validate-node -- the
  # cryptic late failure preflight exists to prevent. (go/golangci-lint are not
  # version-pinned: a mismatch there surfaces as honest lint/test output.)
  - id: preflight
    timeout: 60000
    bash: |
      set -uo pipefail
      missing=""
      have() { command -v "$1" >/dev/null 2>&1; }
      add()  { missing+=$'\n  - '"$1"; }
      have git              || add "git"
      have make             || add "make - runs the Go SDK's Makefile targets"
      have bun              || add "bun - runs the spec-slicer script node (https://bun.sh)"
      have node             || add "node - Node SDK runtime"
      have yarn             || add "yarn - Node SDK package manager (Yarn 1 Classic)"
      have go               || add "go - Go SDK toolchain"
      have uv               || add "uv - Python venv + tooling, manages Python 3.10 (https://docs.astral.sh/uv)"
      have gh               || add "gh - GitHub CLI, opens the PR (https://cli.github.com)"
      have gofumpt          || add "gofumpt - Go formatter            (cd sdk-go && make tools)"
      have go-test-coverage || add "go-test-coverage - Go coverage gate (cd sdk-go && make tools)"
      have golangci-lint    || add "golangci-lint - Go linter         (install separately: https://golangci-lint.run/welcome/install - NOT covered by 'make tools')"
      if have gh && ! gh auth status >/dev/null 2>&1; then
        add "gh is installed but NOT authenticated   (run: gh auth login)"
      fi
      # Yarn must be 1.x, not Berry (see header); validate uses --frozen-lockfile.
      if have yarn && ! yarn --version 2>/dev/null | grep -q '^1\.'; then
        add "yarn is present but not Yarn 1 Classic - CI/validate use 'yarn install --frozen-lockfile' (removed in Yarn Berry); install Yarn 1.x"
      fi
      if [ -n "$missing" ]; then
        {
          echo "=== add-sdk-resource: missing host prerequisites - not starting ==="
          echo "Install/fix the following on the host, then re-run:$missing"
        } >&2
        exit 1
      fi
      echo "Preflight OK - all required tools present and gh authenticated."

  # -- 1. Verify the spec is current, then snapshot it for the slicer --------
  # The slice + conformance scenarios AND each language's codegen all read the
  # WORKTREE's openapi/spec, so they can never drift from each other. We fetch
  # origin/main and fail if the worktree spec is behind (the daily openapi-sync
  # may have landed), so we never build a resource against a stale contract.
  #
  # On $ARGUMENTS (the user's message): in a BASH node Archon does NOT splice it
  # into the script text. Under shellSafe it skips user-controlled vars and passes
  # them as subprocess ENV VARS (dag-executor.ts), so $ARGUMENTS is a real env var
  # expanded by bash at runtime. The double-quoted expansion writes the value
  # verbatim and is never re-parsed as code -- injection-safe even if the message
  # contains quotes or $(...). (A single-quoted heredoc would suppress expansion
  # and write the literal "$ARGUMENTS" -- do NOT do that.) extract-domain then
  # lowercases + tokenizes it, so no normalization is needed here.
  - id: resolve-spec
    depends_on: [preflight]
    bash: |
      set -e
      git fetch --quiet origin main || { echo "git fetch origin main failed - cannot verify the spec is current" >&2; exit 1; }
      # Fail fast if the worktree spec is behind origin/main (see header): codegen
      # reads the worktree spec, so a newer origin/main spec would desync the types.
      if ! git diff --quiet origin/main -- openapi/spec.json openapi/spec.yaml; then
        {
          echo "=== add-sdk-resource: openapi/ is behind origin/main - not starting ==="
          echo "The worktree's spec differs from origin/main (likely the daily"
          echo "openapi-sync has landed newer endpoints). Update local main"
          echo "(git checkout main && git pull) and re-run, so the worktree is cut"
          echo "from the current spec."
        } >&2
        exit 1
      fi
      # Snapshot the worktree spec for the slicer (byte-identical to codegen input).
      cp openapi/spec.json "$ARTIFACTS_DIR/spec.json"
      # $ARGUMENTS = the user's message, passed as an env var (see header); the
      # double-quoted expansion is injection-safe.
      printf '%s\n' "$ARGUMENTS" > "$ARTIFACTS_DIR/domain-input.txt"
      echo "Spec verified current with origin/main; wrote slice snapshot."
    timeout: 60000

  # -- 2. Slice the spec down to the target domain (deterministic, no AI) ----
  # Reads ARTIFACTS_DIR from process.env, NOT a spliced literal: Archon textually
  # substitutes the ARTIFACTS_DIR var into script bodies, but on Windows the path
  # has backslashes and a spliced `const ART = "...\runs\.."` corrupts as JS escape
  # sequences (\r -> CR, others dropped). The env value is a runtime string (no
  # escaping), and process.env (no leading dollar) is itself never substituted.
  # `const REF = "$ref"` is likewise a safe literal (not a substituted var name).
  # The real hazard in this NON-shellSafe script node: the user-message vars
  # (ARGUMENTS / USER_MESSAGE, with a leading dollar) ARE spliced in textually --
  # NEVER reference them here, or raw user text lands in this JS.
  - id: extract-domain
    depends_on: [resolve-spec]
    runtime: bun
    timeout: 60000
    script: |
      import { readFileSync, writeFileSync } from "node:fs";
      // ART from env, not a spliced literal -- Windows backslash safety (see header).
      const ART = process.env.ARTIFACTS_DIR;
      if (!ART) { console.error("ARTIFACTS_DIR env var not set"); process.exit(1); }
      // "$ref" literal is safe; never reference $ARGUMENTS here (see header).
      const REF = "$ref";
      const spec = JSON.parse(readFileSync(ART + "/spec.json", "utf8"));
      const input = readFileSync(ART + "/domain-input.txt", "utf8").toLowerCase();
      const paths = spec.paths || {};

      // Available domains = first path segment after /v1/.
      const domains = new Set();
      for (const p of Object.keys(paths)) {
        const m = p.match(/^\/v1\/([^/]+)/);
        if (m) domains.add(m[1].toLowerCase());
      }
      // Match the user's input against a domain by normalizing both to a
      // space-delimited, lowercase, alphanumeric word form. This makes
      // multi-word / hyphenated domains (e.g. "payment-links") matchable
      // regardless of the separator typed (space, hyphen, underscore); the
      // space-padding enforces word boundaries so "invoice" != "invoices".
      const norm = (s) => " " + s.toLowerCase().replace(/[^a-z0-9]+/g, " ").trim().replace(/\s+/g, " ") + " ";
      const haystack = norm(input);
      let matches = [...domains].filter((d) => haystack.includes(norm(d)));
      // If several domains match (e.g. both "payment" and "payment-links"
      // appear), keep only the most specific - drop any whose word form is
      // contained within another match's.
      if (matches.length > 1) {
        matches = matches.filter((d) => !matches.some((o) => o !== d && norm(o).includes(norm(d))));
      }
      if (matches.length !== 1) {
        console.error("Could not determine a unique domain from: " + JSON.stringify(input.trim()));
        console.error("Available domains: " + [...domains].sort().join(", "));
        console.error(matches.length === 0 ? "No domain matched." : "Ambiguous: " + matches.join(", "));
        process.exit(1);
      }
      const domain = matches[0];
      const prefix = "/v1/" + domain;

      const refs = new Set();
      const collect = (obj) => {
        if (!obj || typeof obj !== "object") return;
        if (Array.isArray(obj)) { obj.forEach(collect); return; }
        for (const [k, v] of Object.entries(obj)) {
          if (k === REF && typeof v === "string") {
            const name = v.split("/").pop();
            if (name) refs.add(name);
          } else collect(v);
        }
      };

      const verbs = ["get", "post", "put", "patch", "delete"];
      const operations = [];
      for (const [p, item] of Object.entries(paths)) {
        if (!(p === prefix || p.startsWith(prefix + "/"))) continue;
        for (const [method, op] of Object.entries(item)) {
          if (!verbs.includes(method.toLowerCase())) continue;
          operations.push({
            method: method.toUpperCase(),
            path: p,
            operationId: op.operationId,
            summary: op.summary,
            description: op.description,
            tags: op.tags,
            parameters: op.parameters,
            requestBody: op.requestBody,
            responses: op.responses,
          });
          collect(op);
        }
      }

      // Resolve referenced component schemas transitively.
      const components = (spec.components && spec.components.schemas) || {};
      const schemas = {};
      const queue = [...refs];
      while (queue.length) {
        const name = queue.shift();
        if (schemas[name] || !components[name]) continue;
        schemas[name] = components[name];
        const before = new Set(refs);
        collect(components[name]);
        for (const r of refs) if (!before.has(r) && !schemas[r]) queue.push(r);
      }

      const out = { domain, basePath: prefix, operationCount: operations.length, operations, schemas };
      writeFileSync(ART + "/resource-spec.json", JSON.stringify(out, null, 2));
      writeFileSync(ART + "/slug.txt", domain);

      console.log("Domain: " + domain + "  (base path " + prefix + ")");
      console.log("Endpoints (" + operations.length + "):");
      for (const op of operations) {
        const s = op.summary ? "  - " + String(op.summary).split("\n")[0] : "";
        console.log("  " + op.method + " " + op.path + s);
      }
      console.log("Referenced schemas: " + Object.keys(schemas).length);

  # -- 3. Implement Node first as the REFERENCE SDK -------------------------
  # Node leads because it is the only SDK whose types are generated from the
  # canonical spec (`yarn generate:types`), so its wire shapes are machine-checked
  # against openapi/ rather than hand-typed (Python and Go hand-write theirs). It
  # implements the resource + examples + unit tests (100% gate) straight from the
  # spec slice and DEFINES the canonical method/arg surface; the conformance
  # scenarios are derived from it next, and Python and Go then match it. No
  # scenarios exist yet, so Node's conformance suite is inert this run - its
  # dispatcher is written but exercises nothing until generate-conformance lands.
  - id: impl-node
    command: implement-resource-node
    depends_on: [extract-domain]
    context: fresh
    skills: [3common-sdk-conventions]
    idle_timeout: 1800000
    # The reference defines the contract every other language copies, so a weak
    # first pass poisons all three. Use Opus with NO fallbackModel (matching
    # generate-conformance): if Opus is unavailable, fail loudly and rerun rather
    # than anchoring the contract on a weaker model.
    model: claude-opus-4-8

  # -- 4. Derive the shared cross-language conformance scenarios from Node ---
  # Captures the behavioral contract (method names, args, wire requests, errors)
  # from the VERIFIED Node reference - reads its actual resource API + summary and
  # encodes that behavior, rather than inventing a contract before any code exists.
  # Self-validates by running Node's conformance subset (reusing the worktree's
  # node_modules from impl-node) and iterating until the reference passes every
  # scenario it produced. Python and Go then implement against these. Lives in
  # conformance/scenarios/<slug>/.
  - id: generate-conformance
    command: generate-conformance
    depends_on: [impl-node]
    context: fresh
    skills: [3common-sdk-conventions]
    idle_timeout: 900000
    # Highest-leverage node: these scenarios become the equivalence gate for the
    # two follower languages. Use Opus and deliberately set NO fallbackModel: if
    # Opus is unavailable, fail loudly and rerun rather than silently deriving a
    # weaker contract that Python and Go would bake in.
    model: claude-opus-4-8

  # -- 5. Human approval on the endpoints + behavioral contract -------------
  - id: review-gate
    depends_on: [validate-node]
    # NOTE: approval messages get node-output substitution ($nodeId.output) but
    # NOT workflow-variable substitution - so $ARTIFACTS_DIR would render
    # literally here, whereas $extract-domain.output resolves. This is undocumented
    # in the bundled refs but confirmed in the engine: dag-executor.ts renders
    # approval.message via substituteNodeOutputRefs; its ref regex allows hyphens
    # in node ids; and every node's output (incl. a script node's stdout) is stored
    # in the shared nodeOutputs map keyed by id, available to later layers. So we
    # inline the endpoint list via $extract-domain.output (the slicer's stdout).
    # capture_response is omitted by choice - NOT a limitation. Command-node
    # prompts DO get $nodeId.output substitution (dag-executor.ts:782), so the
    # impls could read $review-gate.output. We don't wire it in because the
    # conformance scenarios are fixed before this gate, so an approve-with-note
    # that changes the contract (e.g. a method rename) would desync them - contract
    # changes belong in a reject + re-run, keeping this gate go/no-go.
    approval:
      message: |
        Review the resource contract before Python and Go are implemented.

        The Node reference SDK is implemented and has passed its full CI gate
        (lint, types, 100% coverage). It defines the canonical method/arg surface.

        Endpoints wrapped (from the spec slice):
        $extract-domain.output

        Conformance scenarios were DERIVED from that verified Node implementation
        under conformance/scenarios/ - one happy-path per endpoint plus the
        relevant error/pagination paths - and Node passes every one. They are the
        cross-language contract Python and Go will implement against.

        Approve to implement Python and Go (in parallel) and open a stack of draft
        PRs (Node, then Python, Go, then the shared conformance scenarios on top).
        Reject with a reason to stop - contract changes (e.g. a method rename)
        belong in a reject + re-run, since the scenarios are already derived.

  # -- 6. Implement the follower languages (Python, Go) in parallel ---------
  # The Node reference + derived scenarios are approved; Python and Go now
  # implement against those scenarios (the equivalence gate) plus their own unit
  # tests. No git in these nodes.
  - id: impl-python
    command: implement-resource-python
    depends_on: [review-gate]
    context: fresh
    skills: [3common-sdk-conventions]
    idle_timeout: 1800000
    # TUNABLE KNOB: the follower impls are strongly gated (strict lint/types +
    # coverage + conformance against the Node reference), so a Sonnet fallback is
    # safe here. Start on Opus for first-pass quality + fewer iterations against
    # strict gates; once Opus proves to be overkill on routine resources, drop
    # these two to `claude-sonnet-4-6`. (The reference impl-node has no fallback -
    # it defines the contract, so its quality must not silently degrade.)
    model: claude-opus-4-8
    fallbackModel: claude-sonnet-4-6

  - id: impl-go
    command: implement-resource-go
    depends_on: [review-gate]
    context: fresh
    skills: [3common-sdk-conventions]
    idle_timeout: 1800000
    model: claude-opus-4-8   # tunable knob - see impl-python
    fallbackModel: claude-sonnet-4-6

  # -- 7. Deterministic CI-gate per language; marker file gates publish -----
  # validate-node depends on generate-conformance (not just impl-node): it runs
  # AFTER the scenarios are derived, so its `yarn test:coverage` exercises the Node
  # reference against its own conformance scenarios as well as the unit tests - the
  # deterministic gate behind the review-gate. validate-python / validate-go gate
  # the two followers after their impls.
  - id: validate-node
    depends_on: [generate-conformance]
    # 20 min. These gates are slow on cold caches - Node does a cold `yarn
    # install` + tsup build; Python's first `uv run --no-sync pyright` downloads a Node
    # runtime; Go installs oapi-codegen and runs race tests. A timeout here would
    # discard the already-finished (expensive) implementation, so keep headroom.
    timeout: 1200000
    bash: |
      set -e
      cd sdk-node
      # Yarn 1 Classic (no package-lock.json), mirroring .github/workflows/node.yml.
      yarn install --frozen-lockfile
      yarn lint
      yarn format:check
      yarn typecheck
      yarn typecheck:build
      yarn docs:check
      yarn test:coverage
      yarn build
      touch "$ARTIFACTS_DIR/node.ok"

  # validate-python mirrors .github/workflows/python.yml exactly. Strictness lives
  # in pyproject.toml (mypy strict=true, pyright typeCheckingMode=standard, curated
  # ruff select) -- do NOT pass --strict / --select=ALL, and scope mypy to src+tests
  # (running over . pulls in examples/, whose reused module names break mypy with
  # duplicate-module errors). Self-sufficient like validate-node's `yarn install`:
  # dev tools are in [project.optional-dependencies].dev and `uv run` auto-sync does
  # NOT install extras, so install them explicitly (idempotent, reuses an existing
  # .venv). Then run every tool via `uv run --no-sync`: uses the env as installed
  # (no sync that could prune extras) and never writes uv.lock.
  - id: validate-python
    depends_on: [impl-python]
    timeout: 1200000   # 20 min (cold uv install + pyright's Node download) - see validate-node
    bash: |
      set -e
      cd sdk-python
      [ -d .venv ] || uv venv --python 3.10 .venv
      uv pip install -e ".[dev]"
      uv run --no-sync ruff check .
      uv run --no-sync ruff format --check .
      uv run --no-sync mypy src/threecommon tests
      uv run --no-sync pyright src/threecommon
      uv run --no-sync pytest --cov=src/threecommon --cov-fail-under=90 --cov-report=term
      touch "$ARTIFACTS_DIR/python.ok"

  - id: validate-go
    depends_on: [impl-go]
    timeout: 1200000   # 20 min (cold go mod + oapi-codegen install + race tests) - see validate-node
    bash: |
      set -e
      cd sdk-go
      make ci
      go build ./examples/...
      touch "$ARTIFACTS_DIR/go.ok"

  # -- 8a. Build the stacked branches (one per language + conformance), push --
  # Publishing is split into 8a (build + push the stack) and 8b (open the PRs) so
  # each bash node's script stays well under the ~8 KB command-line limit Archon
  # hits on Windows (see the CONVENTION note at the top of `nodes:`).
  #
  # trigger_rule all_success: runs ONLY if all three validate-* passed, so any
  # earlier failure propagates as SKIPPED and nothing is published.
  #
  # The stack, bottom -> top:
  #   main <- <user>/sdk-add-resource/<slug>/node <- .../python <- .../go
  #        <- .../conformance
  # Each language branch carries ONLY its own sdk-<lang>/ tree (the impl plus that
  # language's conformance dispatcher, which lives under sdk-<lang>/); the top
  # branch carries ONLY the shared conformance/scenarios/<slug>/ YAML. Scenarios
  # go last on purpose: the per-language conformance runners glob EVERY scenario
  # and hard-error on a resource with no dispatcher, so a branch holding the
  # scenarios must already have all three dispatchers present. With the scenarios
  # on top, every lower branch (and every intermediate main state as the stack
  # merges bottom-up) has dispatchers but no scenarios yet -> inert and green; the
  # cross-language contract is actually exercised on the top conformance PR, whose
  # CI sees all three impls + the scenarios. (node.yml must list conformance/** in
  # its path filter for the top PR to trigger Node CI - it now does, alongside
  # go.yml and python.yml.)
  #
  # Branch namespacing: keyed to the GitHub user opening the PRs (gh is a required,
  # authenticated prerequisite), so concurrent runs for the same resource by
  # different people never collide. stack.txt (in ARTIFACTS_DIR, never staged)
  # hands the four branch names, in order, to 7b. A preflight rejects the build up
  # front if a leaf branch named exactly $base (an old pre-stacking branch) exists
  # locally or on origin, since it would D/F-conflict with $base/<lang>.
  #
  # set -euo pipefail: any unexpected failure must abort, not push a partial stack.
  # Every EXPECTED non-zero is guarded with `|| ...` or an `if`.
  #
  # Build model: the impl arrives as ONE uncommitted change set spanning all three
  # sdk-<lang>/ trees + conformance/scenarios. We carve it into the stack by
  # switching to each branch in turn (`switch -C` carries the still-uncommitted
  # remainder forward) and committing one path at a time. This relies on the
  # worktree being cut from a base equal to origin/main (resolve-spec enforces the
  # spec is current; Archon cuts the worktree from main), so switching the first
  # branch onto origin/main does not conflict with the local modifications.
  #
  # Resume model keys off a `pending` check = "is there impl work to commit?",
  # computed as `git status` over the same paths the catch-all stages (so the
  # ever-present untracked .archon/.claude/.agents dirs never count, but a
  # half-finished tree of NEW untracked files still does - a plain `git diff`
  # would miss those and wrongly rebuild). A fully-built stack leaves HEAD on the
  # top branch, nothing pending, ahead of origin/main -> reuse those commits and
  # just re-push. A half-built stack leaves HEAD on a stack branch WITH work still
  # pending -> bail for manual cleanup (rebuilding from a partial tree would orphan
  # the already-committed branches). Otherwise it is a fresh pre-build tree -> build.
  #
  # Catch-all `git add -A` (excludes the agent/tool dirs .archon/.claude/.agents
  # Archon materializes into the worktree) sweeps any stray file onto the top
  # branch so nothing is silently dropped. The positive '.' alongside :(exclude)
  # is the portable form (older git mishandles an exclude-only pathspec).
  #
  # force-with-lease (not --force): a --resume after a post-push failure re-creates
  # commits with new SHAs (a plain push would be rejected non-fast-forward), but the
  # lease still refuses if anyone else's push moved a branch.
  - id: publish-commit
    depends_on: [validate-node, validate-python, validate-go]
    trigger_rule: all_success
    timeout: 300000
    bash: |
      set -euo pipefail
      slug=$(cat "$ARTIFACTS_DIR/slug.txt") || { echo "slug.txt missing - extract-domain must have run first" >&2; exit 1; }

      # Atomic gate: every language must have passed its validation.
      missing=""
      for lang in node python go; do
        [ -f "$ARTIFACTS_DIR/$lang.ok" ] || missing="$missing $lang"
      done
      if [ -n "$missing" ]; then
        {
          echo "=== add-sdk-resource: FAILED - no PRs opened ==="
          echo "These languages failed validation:$missing"
          echo "The stack is built and pushed only once all three pass. Resolve the"
          echo "failing language(s) and re-run with --resume."
        } >&2
        # Exit non-zero so --resume re-runs this node once the failing dep is fixed.
        exit 1
      fi

      git fetch --quiet origin main || { echo "git fetch origin main failed - cannot establish a fresh base for the stack" >&2; exit 1; }
      # Namespace the stack by the GitHub user opening the PRs (see header).
      gh_user=$(gh api user --jq .login 2>/dev/null | tr '[:upper:]' '[:lower:]')
      [ -n "$gh_user" ] || { echo "could not resolve GitHub username (gh api user); is gh authenticated?" >&2; exit 1; }
      base="$gh_user/sdk-add-resource/$slug"
      nb="$base/node"; pb="$base/python"; gb="$base/go"; cb="$base/conformance"
      printf '%s\n%s\n%s\n%s\n' "$nb" "$pb" "$gb" "$cb" > "$ARTIFACTS_DIR/stack.txt"

      # Preflight the branch namespace: a leaf ref named exactly $base blocks creating
      # the stacked branches $base/node, $base/python, ... - git forbids a ref and a
      # directory of refs sharing a name (a D/F conflict). This bites when an old
      # pre-stacking branch <user>/sdk-add-resource/<slug> lingers (local or on origin;
      # origin is best-effort - a network hiccup must not block, and push surfaces it too).
      conflict=""
      git show-ref --verify --quiet "refs/heads/$base" && conflict="local"
      if git ls-remote --heads origin "refs/heads/$base" 2>/dev/null | grep -qE "[[:space:]]refs/heads/$base$"; then
        conflict="${conflict:+$conflict + }origin"
      fi
      if [ -n "$conflict" ]; then
        {
          echo "=== add-sdk-resource: branch-name conflict - cannot build the stack ==="
          echo "A branch named '$base' exists ($conflict). It blocks creating the stacked"
          echo "branches '$base/node', '$base/python', etc.: git cannot have both a branch"
          echo "and a directory of branches with the same name. Remove the old branch, then"
          echo "re-run:"
          echo "  git branch -D $base               # if it exists locally"
          echo "  git push origin --delete $base    # if on origin (deletes the branch / any PR head)"
        } >&2
        exit 1
      fi

      head_now=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")
      ahead=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
      on_stack=0
      for b in "$nb" "$pb" "$gb" "$cb"; do [ "$head_now" = "$b" ] && on_stack=1; done
      # pending: is there impl work to commit? Same paths the catch-all stages, so
      # untracked agent dirs are ignored but untracked impl files still count (see header).
      pending() { [ -n "$(git status --porcelain -- . ':(exclude).archon' ':(exclude).claude' ':(exclude).agents' 2>/dev/null)" ]; }

      if [ "$head_now" = "$cb" ] && ! pending && [ "$ahead" -gt 0 ]; then
        # Resume: the full stack is already built on the top branch; just re-push.
        echo "Resuming: stack already built on $cb; re-pushing."
      elif [ "$on_stack" = "1" ] && pending; then
        # Mid-build: a prior run committed some branches but didn't finish (see header).
        {
          echo "=== add-sdk-resource: $head_now is a stack branch with uncommitted changes ==="
          echo "A previous run built part of the stack but didn't finish; rebuilding now"
          echo "would orphan its commits. Inspect, then reset manually before re-running:"
          echo "  git log --oneline origin/main..HEAD ; git status"
          echo "  git switch - && git branch -D $nb $pb $gb $cb 2>/dev/null   # then re-run fresh"
        } >&2
        exit 1
      else
        # Fresh build: carve the one uncommitted change set into the stack, bottom -> top.
        # Nothing pending => no resource changes (it may already exist): success, no branches.
        if ! pending; then
          echo "=== add-sdk-resource: nothing to publish for '$slug' - no changes (the resource may already exist) ==="
          exit 0
        fi
        built=0
        # carve: $1 branch  $2 start-point ("" = current HEAD)  $3 pathspec  $4 message.
        # Capture git's stderr (do NOT suppress it) so a failure - a D/F ref conflict,
        # the branch checked out in another worktree, a tracked-file conflict with
        # origin/main - is self-explaining instead of a bare "could not create".
        carve() {
          local err
          if ! err=$(git switch -C "$1" "${2:-HEAD}" 2>&1 >/dev/null); then
            {
              echo "=== add-sdk-resource: could not create branch $1 ==="
              echo "git: $err"
              echo "Likely $1 is checked out in another worktree (a stale run - see"
              echo "'git worktree list'), a ref conflicts with the name, or the impl"
              echo "touched a tracked file that also moved on origin/main. Resolve, then"
              echo "re-run with --resume."
            } >&2
            exit 1
          fi
          git reset --quiet
          git add -- $3 2>/dev/null || true
          # `if !` not `|| {...}`: under set -e a failed commit must abort.
          if ! git diff --cached --quiet; then git commit --quiet -m "$4"; built=1; fi
        }
        carve "$nb" "origin/main" "sdk-node"              "feat(node): add $slug resource"
        carve "$pb" ""            "sdk-python"            "feat(python): add $slug resource"
        carve "$gb" ""            "sdk-go"                "feat(go): add $slug resource"
        carve "$cb" ""            "conformance/scenarios" "test(conformance): add $slug scenarios"
        # Sweep stray files onto the top branch; exclude agent/tool dirs (see header).
        git add -A -- . ':(exclude).archon' ':(exclude).claude' ':(exclude).agents' 2>/dev/null || true
        if ! git diff --cached --quiet; then
          echo "=== add-sdk-resource: WARNING - unexpected files committed to $cb (misc): ==="
          git diff --cached --name-only | sed 's/^/  /'
          git commit --quiet -m "chore: $slug resource (misc)"
          built=1
        fi
        # built=0 is a legitimate no-op (the resource already exists): success.
        if [ "$built" = "0" ]; then
          echo "=== add-sdk-resource: nothing to publish for '$slug' - no changes (the resource may already exist) ==="
          exit 0
        fi
      fi

      # Push the whole stack (force-with-lease, see header). No 2>/dev/null: surface git's stderr.
      while IFS= read -r b; do
        [ -n "$b" ] || continue
        if ! git push --quiet --force-with-lease -u origin "$b"; then
          echo "=== add-sdk-resource: push failed for $b (see git's error above) ===" >&2
          exit 1
        fi
      done < "$ARTIFACTS_DIR/stack.txt"
      # Marker: tells 7b a real stack was pushed (its absence => nothing to publish).
      touch "$ARTIFACTS_DIR/pushed.ok"
      echo "=== add-sdk-resource: pushed 4-branch stack for '$slug' (base $base) - opening PRs in publish-pr ==="

  # -- 8b. Open the stacked PRs for the branches publish-commit pushed --------
  # Deliberately small (see 8a): just body-build + gh, nowhere near the truncation
  # limit. Runs in the same worktree. Reads the four branch names (in stack order)
  # from stack.txt and opens one draft PR per branch, each based on the branch below
  # it (the node PR targets main).
  #
  # PR body: github.com autofills .github/PULL_REQUEST_TEMPLATE.md in the web UI but
  # `gh pr create` does not, and the repo expects PRs to follow it, so we fill the
  # template for every PR: set the Summary, tick the one affected SDK (the shared
  # scenarios PR ticks "OpenAPI spec / shared"), tick "New feature", and tick the
  # checklist items that apply (the language PRs also tick Code examples + CHANGELOG;
  # the scenarios PR omits those two). We tick by substring-matching each checkbox
  # line in a read loop, not via sed, to avoid escaping the parens/slashes/`>=` in
  # the template labels. A shared note explaining the stack is appended after the body.
  #
  # Idempotent on --resume: each PR is skipped if one is already open for its head
  # branch, and any gh failure exits non-zero (NOT swallowed) so --resume retries
  # the rest. The branches are already pushed (7a); leaving a PR unopened must keep
  # the node status honest rather than reporting success.
  - id: publish-pr
    depends_on: [publish-commit]
    timeout: 120000
    bash: |
      set -euo pipefail
      slug=$(cat "$ARTIFACTS_DIR/slug.txt") || { echo "slug.txt missing" >&2; exit 1; }
      [ -f "$ARTIFACTS_DIR/stack.txt" ] || { echo "stack.txt missing -- publish-commit must run first" >&2; exit 1; }
      # No marker => publish-commit found nothing to publish; nothing to open.
      if [ ! -f "$ARTIFACTS_DIR/pushed.ok" ]; then
        echo "=== add-sdk-resource: nothing to publish for '$slug' - no PRs opened ==="
        exit 0
      fi
      { read -r nb; read -r pb; read -r gb; read -r cb; } < "$ARTIFACTS_DIR/stack.txt"

      tmpl=".github/PULL_REQUEST_TEMPLATE.md"
      bf="$ARTIFACTS_DIR/pr-body.md"
      note="Stacked PR set for the \`$slug\` resource: main <- node <- python <- go <- conformance. Generated by the Archon add-sdk-resource workflow; opened as drafts. Each lower PR adds one language; the top conformance PR adds the shared scenarios and is where cross-language conformance CI actually runs (it carries all three implementations). Recommended to review and merge bottom-up."

      # build_body: $1 summary  $2 affected-SDK label substring  $3 mode (lang|shared).
      # Fills the PR template (or a minimal body if it is missing), then appends $note.
      # Ticks any checkbox line containing one of $marks; everything else is verbatim.
      build_body() {
        local summary="$1" affected="$2" mode="$3"
        if [ ! -f "$tmpl" ]; then
          printf '## Summary\n\n%s\n\n---\n\n%s\n' "$summary" "$note"
          return 0
        fi
        local marks=("$affected" "New feature" "Tests added" "Coverage gate" "Lint, type-check" "No secrets" "Conformance scenarios" "Conventional Commits")
        [ "$mode" = "lang" ] && marks+=("Code examples" "CHANGELOG")
        local line out m
        while IFS= read -r line; do
          case "$line" in
            *"One or two sentences"*) printf '%s\n' "$summary"; continue ;;
          esac
          case "$line" in
            "- [ ] "*)
              out="$line"
              for m in "${marks[@]}"; do
                case "$line" in *"$m"*) out="${line/- \[ \]/- [x]}"; break ;; esac
              done
              printf '%s\n' "$out" ;;
            *) printf '%s\n' "$line" ;;
          esac
        done < "$tmpl"
        printf '\n---\n\n%s\n' "$note"
      }

      # open_pr: $1 head  $2 base  $3 title  $4 summary  $5 affected-label  $6 mode.
      open_pr() {
        if existing=$(gh pr view "$1" --json url -q .url 2>/dev/null) && [ -n "$existing" ]; then
          echo "  $1 -> already open: $existing"
          return 0
        fi
        build_body "$4" "$5" "$6" > "$bf"
        if ! url=$(gh pr create --draft --base "$2" --head "$1" --title "$3" --body-file "$bf" 2>&1); then
          {
            echo "=== add-sdk-resource: gh pr create FAILED for $1 (base $2) ==="
            echo "$url"
          } >&2
          return 1
        fi
        echo "  $1 (base $2) -> $url"
        return 0
      }

      rc=0
      open_pr "$nb" "main" "feat(node): add $slug resource" \
        "Adds the \`$slug\` resource to the Node SDK: client + types, per-endpoint examples, unit tests, and the conformance dispatcher." \
        "Node.js" "lang" || rc=1
      open_pr "$pb" "$nb" "feat(python): add $slug resource" \
        "Adds the \`$slug\` resource to the Python SDK. Stacked on the Node PR." \
        "Python" "lang" || rc=1
      open_pr "$gb" "$pb" "feat(go): add $slug resource" \
        "Adds the \`$slug\` resource to the Go SDK. Stacked on the Python PR." \
        "Go (" "lang" || rc=1
      open_pr "$cb" "$gb" "test(conformance): add $slug scenarios" \
        "Adds the shared cross-language conformance scenarios for \`$slug\`. Stacked on the Go PR; merging it activates the conformance suites across all three SDKs." \
        "OpenAPI spec" "shared" || rc=1

      if [ "$rc" != "0" ]; then
        echo "=== add-sdk-resource: one or more PRs failed to open; re-run with --resume (idempotent) ===" >&2
        exit 1
      fi
      echo "=== add-sdk-resource: opened 4-PR stack for '$slug' (review/merge bottom-up) ==="
