name: Python SDK

on:
  pull_request:
    paths:
      - "sdk-python/**"
      - "openapi/**"
      - "conformance/**"
      - ".github/workflows/python.yml"
  push:
    branches:
      - main
    paths:
      - "sdk-python/**"
      - "openapi/**"
      - "conformance/**"
      - ".github/workflows/python.yml"

permissions:
  contents: read

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: sdk-python

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.8"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install project + type-checkers
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]"
      - name: mypy --strict
        run: |
          . .venv/bin/activate
          mypy src/threecommon tests
      - name: pyright
        run: |
          . .venv/bin/activate
          pyright src/threecommon

  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install project + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        run: pytest -q

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test with coverage gate
        run: pytest --cov=src/threecommon --cov-fail-under=90 --cov-report=xml --cov-report=term

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install hatch
        run: pip install hatch
      - name: Build sdist + wheel
        run: hatch build
      - name: Verify built artifacts
        run: |
          ls -la dist/
          python -m zipfile -l dist/*.whl

  # Run from the repo root so the whole monorepo is scanned (not just sdk-python/),
  # and so the downloaded binary + the scan command share a working directory.
  gitleaks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version
      - name: Scan
        run: ./gitleaks detect --source . --no-banner --redact
