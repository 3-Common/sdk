# Maintainer-only pre-release smoke test against the production API.
#
# - Triggered manually (workflow_dispatch) or by the `live-smoke` label on a PR.
# - Reads secrets.THREECOMMON_API_KEY (set ONLY in the upstream repo, never on forks).
# - Runs <= 10 calls per SDK: happy paths across events + invoices plus the common error paths (401, 404).

name: Live smoke (maintainer-only)

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  guard:
    # Only run on label trigger when the label is exactly `live-smoke` AND the PR
    # comes from the upstream repo (not a fork).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'live-smoke' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Verify secret is configured
        run: |
          if [ -z "${{ secrets.THREECOMMON_API_KEY }}" ]; then
            echo "::error::THREECOMMON_API_KEY secret not set in this repository."
            exit 1
          fi
          echo "Guards passed."

  smoke-node:
    needs: guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-node
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: sdk-node/yarn.lock
      - run: yarn install --frozen-lockfile
      - name: Live smoke
        env:
          THREECOMMON_API_KEY: ${{ secrets.THREECOMMON_API_KEY }}
          THREECOMMON_BASE_URL: ${{ vars.THREECOMMON_BASE_URL || 'https://api.3common.com' }}
          SMOKE_EVENT_ID: ${{ vars.SMOKE_EVENT_ID }}
          SMOKE_INVOICE_ID: ${{ vars.SMOKE_INVOICE_ID }}
        run: yarn smoke

  smoke-python:
    needs: guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Live smoke
        env:
          THREECOMMON_API_KEY: ${{ secrets.THREECOMMON_API_KEY }}
          THREECOMMON_BASE_URL: ${{ vars.THREECOMMON_BASE_URL || 'https://api.3common.com' }}
          SMOKE_EVENT_ID: ${{ vars.SMOKE_EVENT_ID }}
          SMOKE_INVOICE_ID: ${{ vars.SMOKE_INVOICE_ID }}
        run: python scripts/livesmoke.py

  smoke-go:
    needs: guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache-dependency-path: sdk-go/go.sum
      - name: Live smoke
        env:
          THREECOMMON_API_KEY: ${{ secrets.THREECOMMON_API_KEY }}
          THREECOMMON_BASE_URL: ${{ vars.THREECOMMON_BASE_URL || 'https://api.3common.com' }}
          SMOKE_EVENT_ID: ${{ vars.SMOKE_EVENT_ID }}
          SMOKE_INVOICE_ID: ${{ vars.SMOKE_INVOICE_ID }}
        run: go run ./scripts/livesmoke
