name: OpenAPI sync

on:
  schedule:
    # Daily at 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: openapi-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install fetch deps
        working-directory: openapi
        run: npm ci

      - name: Typecheck fetch script
        working-directory: openapi
        run: npm run typecheck

      - name: Fetch + bundle spec
        working-directory: openapi
        env:
          OPENAPI_SOURCE_URL: ${{ vars.OPENAPI_SOURCE_URL || 'https://api.3common.com/docs/json' }}
        run: npm run fetch

      - name: Detect spec changes
        id: diff
        run: |
          if git diff --quiet -- openapi/spec.json openapi/spec.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Regenerate Node's `src/generated/types.ts` from the new spec.
      - name: Regenerate Node types
        if: steps.diff.outputs.changed == 'true'
        working-directory: sdk-node
        run: |
          yarn install --frozen-lockfile
          yarn generate:types

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/openapi-sync
          commit-message: "chore(openapi): sync spec + regen Node types"
          title: "chore(openapi): sync spec"
          body: |
            Automated OpenAPI spec refresh from `${{ vars.OPENAPI_SOURCE_URL || 'https://api.3common.com/docs/json' }}`.

            Includes:
            - `openapi/spec.json` + `openapi/spec.yaml` — fresh snapshot from the live API
            - `sdk-node/src/generated/types.ts` — regenerated via `yarn generate:types`

            Review the diff and merge if changes are intentional. The per-language CI runs on the PR to catch any breakage from the new types.
          labels: |
            openapi
            automated
          delete-branch: true
