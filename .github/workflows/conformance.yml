# Cross-language conformance tests.
#
# Each per-language workflow runs the conformance
# scenarios under conformance/scenarios/*.yaml as part of its CI.

name: Conformance

on:
  pull_request:
    paths:
      - "conformance/**"
      - ".github/workflows/conformance.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install yamllint + pyyaml
        run: pip install --quiet yamllint pyyaml

      - name: Lint YAML formatting
        run: |
          cat <<'YAML' > /tmp/yamllint.yml
          extends: default
          rules:
            line-length:
              max: 200
              level: warning
            document-start: disable
            truthy:
              check-keys: false
          YAML
          yamllint -c /tmp/yamllint.yml conformance/scenarios/

      - name: Validate scenario schema
        run: python .github/scripts/validate_conformance.py
