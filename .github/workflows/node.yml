name: Node SDK

on:
  pull_request:
    paths:
      - "sdk-node/**"
      - "openapi/**"
      - ".github/workflows/node.yml"
  push:
    branches:
      - main
    paths:
      - "sdk-node/**"
      - "openapi/**"
      - ".github/workflows/node.yml"

permissions:
  contents: read

concurrency:
  group: node-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: sdk-node

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: sdk-node/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: sdk-node/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn typecheck:build

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: sdk-node/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn docs:check

  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: yarn
          cache-dependency-path: sdk-node/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: sdk-node/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn test:coverage
      - uses: codecov/codecov-action@v5
        if: always()
        with:
          files: sdk-node/coverage/lcov.info
          flags: sdk-node
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: sdk-node/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - name: Validate published tarball
        run: |
          npm pack --dry-run
          npm pack
          tar -tzf 3common-sdk-*.tgz | head -20

  # Secret scanning. The gitleaks GitHub Action requires a paid license for
  # organizations as of mid-2024, so we use the CLI directly (free, same engine,
  # same .gitleaksignore). GitHub's built-in secret scanning + push protection
  # provides a second layer for any miss here.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version
      - name: Scan
        run: ./gitleaks detect --source . --no-banner --redact
