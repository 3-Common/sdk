name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: sdk
    attributes:
      label: Affected SDK
      options:
        - Node.js (@3-common/sdk)
        - Python (threecommon)
        - Go (github.com/3-Common/sdk/sdk-go)
        - Cross-SDK / repo infrastructure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case. What workaround are you using today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the SDK to do? Code snippets welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why they don't fit.
