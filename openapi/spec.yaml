                                      description: If true, the element's prompt will not be shown to respondents.
                                      type: boolean
                                    helperText:
                                      description: Optional subtle helper text to display below the element.
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                        - Text
                                    required:
                                      type: boolean
                                      description: If true, the respondent must answer this question to submit the form.
                                    propertyId:
                                      description: |-
                                        ID of a CRM property that will be set by the answer to this question.
                                        The CRM property's data type must align with the question's type.
                                        For standalone forms, only Contact properties can be used.
                                        For order forms, Ticket properties can be used for ticket-holder questions,
                                        Order properties can be used for buyer-only questions, and Contact properties
                                        can be used in either section.
                                      type: string
                                    propertyData:
                                      description: >-
                                        If propertyId is specified, this will contain additional data about the CRM
                                        property linked to this question. Populated by the backend when fetching the
                                        form, not saved to the database.
                                      type: object
                                      properties:
                                        type:
                                          type: string
                                          enum:
                                            - Text
                                        objectType:
                                          type: string
                                          enum:
                                            - contact
                                            - order
                                            - ticket
                                          description: |-
                                            The kind of object that a form-linked CRM property writes to.
                                            - contact: properties on customer contact records
                                            - order: properties on orders (buyer-level)
                                            - ticket: properties on individual products within an order
                                        status:
