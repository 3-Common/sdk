    patch:
      summary: Update Subscription (mid-cycle change with proration)
      tags:
        - Subscriptions
      description: >-
        Changes a subscription's priceId and/or quantity mid-cycle and issues a Stripe-style daily-prorated invoice for
        the rate difference. Allowed on active or trialing subs only (trialing skips proration entirely — the new price
        takes effect at trial end). The new price must be active, recurring, and the same currency as the current one.
        Downgrades that net <= 0 apply without generating a credit invoice (v1 has no credit balance — the customer
        simply pays less at next renewal).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                priceId:
                  description: Switch to this Price. Must be active, recurring, same currency.
                  type: string
                quantity:
                  description: New unit count. Must differ from the current quantity when priceId is unchanged.
                  type: integer
                  minimum: 1
                  maximum: 9007199254740991
                notes:
                  description: Memo carried onto future renewal invoices. Empty/whitespace clears.
                  type: string
                  maxLength: 5000
                taxIds:
                  description: Tax-ID snapshot forwarded onto future renewals.
                  maxItems: 20
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        maxLength: 50
                      value:
                        type: string
                        maxLength: 100
                    required:
                      - type
                      - value
                taxRate:
                  description: Tax rate (percent) applied to renewal subtotals. 0 clears.
                  type: number
                  minimum: 0
                  maximum: 100
                autoCharge:
                  description: Flip auto-charge vs. manual-collection. Effective next renewal.
                  type: boolean
                dunningEnabled:
                  description: Smart-retry toggle for failed renewals.
                  type: boolean
                paymentDueDays:
                  description: Net-N-days for manual-collection invoices.
                  type: integer
                  minimum: 0
                  maximum: 9007199254740991
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: Subscription id, discoverable via list_subscriptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      hostId:
                        type: string
                      contactId:
                        description: CRM contact id; optional until linked
                        type: string
                      customerEmail:
                        description: Email; allows late-linking to a contact
                        type: string
                      priceId:
                        type: string
                        description: Primary item shortcut — mirrors items[0].priceId
                      quantity:
                        type: integer
                        minimum: 1
                        maximum: 9007199254740991
                        description: Primary item shortcut — mirrors items[0].quantity
                      items:
                        description: >-
                          All billed lines on this subscription. Each item shares the parent sub's billing cycle (Phase
                          1).
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            priceId:
                              type: string
                            quantity:
                              type: integer
                              minimum: 1
                              maximum: 9007199254740991
                          required:
                            - id
                            - priceId
                            - quantity
                          additionalProperties: false
                      status:
                        type: string
                        enum:
                          - incomplete
                          - trialing
                          - active
                          - past_due
                          - canceled
                          - unpaid
                        description: |-
                          Subscription lifecycle.
                          - incomplete: created, awaiting first payment
                          - trialing: in trial period
                          - active: paying
                          - past_due: renewal payment failed; scheduler is retrying per dunning policy
                          - canceled: terminal — clean cancellation
