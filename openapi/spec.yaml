  /v1/forms/{formId}/elements/{elementId}/position:
    put:
      summary: Move Element
      tags:
        - Forms
      description: |-
        Move an element to a different position in the form's layout. The
        `position` is a 0-based row index in the form's `rows` array.
        For order forms, the `section` parameter moves an element between the
        buyer and ticket-holder sections, which updates `askAllAttendees` and
        adjusts `attendeeRowsStart` automatically. If `section` is omitted on an
        order form, the element stays in its current section. The parameter is
        ignored for standalone forms.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                position:
                  type: number
                  description: The target row index (0-based) in the form's `rows` array.
                section:
                  description: |-
                    For order forms only. Moves the element to the specified section, updating
                    `askAllAttendees` accordingly.
                  type: string
                  enum:
                    - buyer
                    - ticket-holder
              required:
                - position
      parameters:
        - schema:
            type: string
          in: path
          name: formId
          required: true
          description: The ID of the form.
        - schema:
            type: string
          in: path
          name: elementId
          required: true
          description: The ID of the element.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - type: object
                        properties:
                          id:
                            type: string
                            description: The form's ID.
                          name:
                            type: string
                            description: The form's display name.
                          nameHidden:
                            description: If true, the name of the form will not be shown to respondents.
                            type: boolean
                          ownerId:
                            type: string
                            description: The ID of the host who owns this form.
                          status:
                            type: string
                            enum:
                              - draft
                              - active
                              - archived
                            description: >-
                              Determines the status of the form.

                              - draft: the form cannot be accessed directly at its URL, and may not show up to the
                              organizer in tables by default

                              - active: the form can be accessed by its URL, and appears to the organizer in all tables

                              - archived: for all intents and purposes, the form is deleted, but can still be accessed
                              and restored in the forms dashboard
                          rows:
                            type: array
                            items:
                              type: object
                              properties:
                                columns:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      elementIndex:
                                        type: number
                                        description: |-
                                          The index of the element in the form's `elements` array which is
                                          displayed in this column.
                                      widthFraction:
                                        type: number
                                        description: |-
                                          A value between 0 and 1 that determines the width of this column in the row.
                                          The sum of all `widthFraction` values in a row always sums to 1.
                                    required:
                                      - elementIndex
                                      - widthFraction
                                    additionalProperties: false
                                  description: |-
                                    Determines which elements are displayed in the row, and how much of the
                                    row's total width each element occupies.
                              required:
                                - columns
                              additionalProperties: false
                            description: |-
                              A form's layout consists of rows, each with one or more columns. Each column
                              contains a single form element. Form layouts determine the order that the
                              form's elements are displayed in, not the order of the form's `elements`
                              array.
                          submitButtonText:
                            type: string
                            description: Text displayed in the form's submission button. Typically, "Submit" is the default.
                          submitButtonWidth:
                            type: string
                            enum:
                              - auto
                              - fill
                            description: >-
                              Whether the form's submission button should shrink to fit its label ("auto"), or fill its
                              container ("fill").
                          submitButtonAlign:
                            description: >-
                              If `submitButtonWidth` is "auto", this determines how the submission button is
                              horizontally aligned.
                            type: string
                            enum:
                              - left
                              - center
                          type:
                            type: string
                            enum:
                              - standalone
                          elements:
