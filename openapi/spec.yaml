  /v1/forms/{formId}/elements/{elementId}:
    patch:
      summary: Edit Element
      tags:
        - Forms
      description: |-
        Update one or more fields on an existing element. Only the fields provided
        will be overwritten; omitted fields are left unchanged. The element's
        `type` cannot be changed. This tool can also set `forEventItems` to
        control checkout-based visibility on order forms. To move a element between
        the buyer and attendee sections, use `move_element` instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  description: For question elements, the question text; for static elements, a label shown above the element.
                promptHidden:
                  anyOf:
                    - description: If true, the element's prompt will not be shown to respondents.
                      type: boolean
                    - nullable: true
                      enum:
                        - null
                  description: If true, the element's prompt will not be shown to respondents.
                helperText:
                  anyOf:
                    - description: Optional subtle helper text to display below the element.
                      type: string
                    - nullable: true
                      enum:
                        - null
                  description: Optional subtle helper text to display below the element.
                placeholder:
                  anyOf:
                    - description: >-
                        Only for questions with text inputs or drop-down lists, this is the placeholder shown when the
                        input is empty
                      type: string
                    - nullable: true
                      enum:
                        - null
                  description: >-
                    Only for questions with text inputs or drop-down lists, this is the placeholder shown when the input
                    is empty
                required:
                  anyOf:
                    - description: |-
                        For all non-static questions except 'Select Multiple' and 'Select Multiple with "Other"',
                        this is true if the question is required to submit the form.
                      type: boolean
                    - nullable: true
                      enum:
                        - null
                  description: |-
                    For all non-static questions except 'Select Multiple' and 'Select Multiple with "Other"',
                    this is true if the question is required to submit the form.
                propertyId:
                  anyOf:
                    - description: |-
                        ID of a CRM property that will be set by the answer to this question.
                        The CRM property's data type must align with the question's type.
                        For standalone forms, only Contact properties can be used.
                        For order forms, Ticket properties can be used for ticket-holder questions,
                        Order properties can be used for buyer-only questions, and Contact properties
                        can be used in either section.
                        For multiple-choice questions, the custom property also provides the
                        selectable options, and exactly one of `propertyId` or `options` must be
                        specified.
                      type: string
                    - nullable: true
                      enum:
                        - null
                  description: |-
                    ID of a CRM property that will be set by the answer to this question.
                    The CRM property's data type must align with the question's type.
                    For standalone forms, only Contact properties can be used.
                    For order forms, Ticket properties can be used for ticket-holder questions,
                    Order properties can be used for buyer-only questions, and Contact properties
                    can be used in either section.
                    For multiple-choice questions, the custom property also provides the
                    selectable options, and exactly one of `propertyId` or `options` must be
                    specified.
                contactField:
                  anyOf:
                    - type: string
                      enum:
                        - email
                        - phone
                        - firstName
                        - lastName
                        - status
                      description: |-
                        Allows applicable questions to automatically populate customer information in the CRM.
                        - email: can only be used on "Email" questions
                        - phone: can only be used on "Phone" questions
                        - firstName, lastName: can only be used on "Text" questions
                        - status: can only be used on "Yes/No" questions
                    - nullable: true
                      enum:
                        - null
                options:
                  anyOf:
                    - description: >-
                        If the question is not linked to a CRM property, this array will contain the question's options.
                        If the question is linked to a CRM property, the options are derived from the CRM property, and
                        this field will be undefined.
                      type: array
                      items:
                        type: string
                    - nullable: true
                      enum:
                        - null
                  description: >-
                    If the question is not linked to a CRM property, this array will contain the question's options. If
                    the question is linked to a CRM property, the options are derived from the CRM property, and this
                    field will be undefined.
                dropdown:
                  anyOf:
                    - description: |-
                        Only for 'Select One' questions (**not** including 'Select One or "Other"'),
                        if this is true, the question will be shown as a dropdown list. Otherwise,
                        it will be shown as a group of radio buttons.
                      type: boolean
                    - nullable: true
                      enum:
                        - null
                  description: |-
                    Only for 'Select One' questions (**not** including 'Select One or "Other"'),
                    if this is true, the question will be shown as a dropdown list. Otherwise,
                    it will be shown as a group of radio buttons.
                otherPrompt:
                  anyOf:
                    - description: |-
                        Only allowed (and required) for 'Select One or "Other"' and 'Select Multiple with "Other"'
                        questions, this is the label used for the "other" option's radio/checkbox.
                      type: string
                    - nullable: true
                      enum:
                        - null
                  description: |-
                    Only allowed (and required) for 'Select One or "Other"' and 'Select Multiple with "Other"'
                    questions, this is the label used for the "other" option's radio/checkbox.
                minChoices:
                  anyOf:
                    - description: |-
                        Required for 'Select Multiple' and 'Select Multiple with "Other"'. The
                        minimum number of choices that must be selected (set to 0 to make the
                        question optional).
                      type: number
                    - nullable: true
                      enum:
                        - null
                  description: |-
                    Required for 'Select Multiple' and 'Select Multiple with "Other"'. The
                    minimum number of choices that must be selected (set to 0 to make the
                    question optional).
                maxChoices:
                  anyOf:
                    - description: |-
                        For 'Select Multiple' and 'Select Multiple with "Other"', this is an
                        optional maximum number of choices that can be selected.
                      type: number
                    - nullable: true
                      enum:
                        - null
                  description: |-
                    For 'Select Multiple' and 'Select Multiple with "Other"', this is an
                    optional maximum number of choices that can be selected.
                min:
                  anyOf:
                    - description: |-
                        For 'Date' questions, the optional minimum allowed date,
                        as a string in YYYY-MM-DD format.
                      type: string
                    - nullable: true
                      enum:
                        - null
                  description: |-
                    For 'Date' questions, the optional minimum allowed date,
                    as a string in YYYY-MM-DD format.
                max:
                  anyOf:
                    - description: |-
                        For 'Date' questions, the optional maximum allowed date,
                        as a string in YYYY-MM-DD format.
                      type: string
                    - nullable: true
                      enum:
                        - null
                  description: |-
                    For 'Date' questions, the optional maximum allowed date,
                    as a string in YYYY-MM-DD format.
                accept:
                  anyOf:
                    - description: |-
                        For 'File' questions, determines the types of file that are allowed to be
                        uploaded for the question. This array must be present and contain at least
                        one element for 'File' questions.
                      type: array
                      items:
                        type: string
                        enum:
                          - images
                          - documents
                          - data
                          - audio
                          - video
                    - nullable: true
                      enum:
                        - null
                  description: |-
                    For 'File' questions, determines the types of file that are allowed to be
                    uploaded for the question. This array must be present and contain at least
                    one element for 'File' questions.
                logicGroups:
                  anyOf:
                    - description: |-
                        Allows questions with fixed options (select one/multiple, yes/no) to
                        conditionally reveal other questions in the form. Any question referenced by
                        a conditional logic group will be hidden until one of the groups referencing
                        it is satisfied.
                      type: array
                      items:
                        anyOf:
                          - type: object
                            properties:
                              revealedElementIndex:
                                type: number
                                description: |-
