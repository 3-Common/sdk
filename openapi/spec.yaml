  /v1/invoices/{id}/payments:
    post:
      summary: Mark Invoice Paid
      tags:
        - Invoices
      description: >-
        Records a manual payment against an open invoice. Cumulative payments meeting the total transition the invoice
        to paid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payment:
                  type: integer
                  minimum: 1
                  maximum: 9007199254740991
                  description: Payment amount in the invoice currency, minor units
                idempotencyKey:
                  description: Caller-supplied dedupe key. Replaying the same key for the same invoice is a no-op.
                  type: string
                note:
                  description: Free-form note recorded on the payment (e.g. payment method)
                  type: string
              required:
                - payment
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: Invoice id, discoverable via list_invoices
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      hostId:
                        type: string
                      customerId:
                        type: string
                        description: CRM contact id of the recipient
                      number:
                        anyOf:
                          - type: string
                          - nullable: true
                            enum:
                              - null
                        description: Sequential invoice number; null while in draft
                      currency:
                        type: string
                        enum:
                          - USD
                          - CAD
                      lineItems:
                        type: array
                        items:
                          type: object
                          properties:
                            description:
                              type: string
