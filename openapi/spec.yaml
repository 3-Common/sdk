  /v1/contacts/bulk:
    post:
      summary: Bulk Upsert Contacts
      tags:
        - Contacts
      description: Upserts up to many contacts in one round-trip. Deduplicated server-side by email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contacts:
                  minItems: 1
                  type: array
                  items:
                    type: object
                    properties:
                      email:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                      phone:
                        anyOf:
                          - type: string
                          - nullable: true
                            enum:
                              - null
                      status:
                        type: string
                        enum:
                          - deleted
                          - imported
                          - unsubscribed
                          - opted-in
                          - unknown
                        description: |-
                          Contact lifecycle status.
                          - opted-in / unsubscribed: explicit consent state
                          - unknown: never recorded a choice
                          - imported / deleted: lifecycle states from list imports / soft-deletes
                      properties:
                        type: array
                        items:
                          type: object
                          properties:
                            property_id:
                              type: string
                            value:
                              anyOf:
                                - type: string
                                - type: array
                                  items:
                                    type: string
                                - type: boolean
                          required:
                            - property_id
                            - value
                      eventsAttended_IDS:
                        type: array
                        items:
                          type: string
                      itemsPurchased_IDS:
                        type: array
                        items:
                          type: string
                      productsPurchased_IDS:
                        type: array
                        items:
                          type: string
                    required:
                      - email
                    additionalProperties: {}
                  description: >-
                    Contacts to upsert, deduped server-side by email. Existing rows are updated (not just inserted) so
                    re-imports refresh the persisted fields.
              required:
                - contacts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      affected:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                    required:
                      - affected
                    additionalProperties: false
                required:
                  - data
                additionalProperties: false
        '400':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '403':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
