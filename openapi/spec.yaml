                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
    post:
      summary: Create Form
      tags:
        - Forms
      description: |-
        Create a new, empty form with no elements. The `isEventForm` flag may
        only be set at creation time and cannot be changed afterwards, because
        converting between standalone and event forms is a destructive operation
        that affects element layout and attendee configuration.
        Returns the full form document.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The form's display name.
                nameHidden:
                  description: If true, the name of the form will not be shown to respondents.
                  type: boolean
                status:
                  type: string
                  enum:
                    - draft
                    - active
                    - archived
                  description: >-
                    Determines the status of the form.

                    - draft: the form cannot be accessed directly at its URL, and may not show up to the organizer in
                    tables by default

                    - active: the form can be accessed by its URL, and appears to the organizer in all tables

                    - archived: for all intents and purposes, the form is deleted, but can still be accessed and
                    restored in the forms dashboard
                submitButtonText:
                  type: string
                  description: Text displayed in the form's submission button. Typically, "Submit" is the default.
                submitButtonWidth:
                  type: string
                  enum:
                    - auto
                    - fill
                  description: >-
                    Whether the form's submission button should shrink to fit its label ("auto"), or fill its container
                    ("fill").
                submitButtonAlign:
                  description: If `submitButtonWidth` is "auto", this determines how the submission button is horizontally aligned.
                  type: string
                  enum:
                    - left
                    - center
                type:
                  type: string
                  enum:
                    - standalone
                    - order
                  description: |-
                    Whether this form is to be used for orders, or standalone. This flag may
                    only be set at creation time and cannot be changed later.
              required:
                - name
                - type
              description: |-
                Subset of form fields which can be set when creating a form. Elements and
                layout are not included because they are managed by other tools.
        description: |-
          Subset of form fields which can be set when creating a form. Elements and
          layout are not included because they are managed by other tools.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
