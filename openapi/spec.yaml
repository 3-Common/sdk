    delete:
      summary: Remove Logic Rule
      tags:
        - Forms
      description: |-
        Remove all conditional logic rules on a source element which target a
        specific revealed element. If the source element has no remaining logic
        rules after removal, its `logicGroups` array is removed entirely.
      parameters:
        - schema:
            type: string
          in: path
          name: formId
