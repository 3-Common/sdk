  /v1/invoices/:
    get:
      summary: List Invoices
      tags:
        - Invoices
      description: >-
        Lists the host's invoices, optionally filtered by status, recipient, or issue date. Sorted by issuedAt
        descending. Paginated.
      parameters:
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: page
          required: false
          description: Page number (0-based, default 0)
        - schema:
            default: 20
            type: integer
            minimum: 1
            maximum: 100
          in: query
          name: pageSize
          required: false
          description: Items per page (default 20, max 100)
        - schema:
            type: string
            enum:
              - draft
              - open
              - payment_failed
              - paid
              - void
          in: query
          name: status
          required: false
          description: Filter by status; omit to include all
        - schema:
            type: string
          in: query
          name: customerId
          required: false
          description: Filter by recipient contact id
        - schema:
            type: string
          in: query
          name: subscriptionId
          required: false
          description: Filter to invoices generated by this subscription (renewals, proration adjustments)
        - schema:
            type: string
            format: date-time
            pattern: >-
              ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
          in: query
          name: issuedAfter
          required: false
          description: Only invoices issued on or after this date (ISO 8601)
        - schema:
            type: string
            format: date-time
            pattern: >-
              ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
          in: query
          name: issuedBefore
          required: false
          description: Only invoices issued on or before this date (ISO 8601)
        - schema:
            type: string
          in: query
          name: fields
          required: false
          description: >-
            Comma-separated list of fields to return. Valid: id, hostId, customerId, customerEmail, customerFirstName,
            customerLastName, customerPhone, number, currency, subtotal, taxTotal, total, amountPaid, amountDue, status,
            autoCharge, issuedAt, dueAt, paidAt, voidedAt, subscriptionId, quoteId, createdAt, updatedAt. Omit for all
            fields.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        hostId:
                          type: string
                        customerId:
                          type: string
                          description: CRM contact id of the recipient
                        customerEmail:
                          description: Snapshot of the recipient's email captured at create time
                          type: string
                        customerFirstName:
                          description: Snapshot of the recipient's first name captured at create time
                          type: string
                        customerLastName:
                          description: Snapshot of the recipient's last name captured at create time
                          type: string
                        customerPhone:
                          description: Snapshot of the recipient's phone captured at create time
                          type: string
                        number:
                          anyOf:
                            - type: string
                            - nullable: true
                              enum:
                                - null
                          description: Sequential invoice number; null while in draft
                        currency:
                          type: string
                          enum:
                            - USD
                            - CAD
                        lineItems:
                          type: array
                          items:
                            type: object
                            properties:
                              description:
                                type: string
                                description: Human-readable description shown on the invoice
                              quantity:
                                type: integer
                                minimum: 1
                                maximum: 9007199254740991
                                description: Whole units billed
                              unitAmount:
                                type: integer
                                minimum: 0
                                maximum: 9007199254740991
                                description: Per-unit price in the invoice currency, minor units (cents for USD)
                              productId:
                                description: Optional reference to a Product in the catalog
                                type: string
                              priceId:
                                description: Optional reference to the Price doc that backed this line (subscription billing)
                                type: string
                              eventId:
                                description: Optional reference to an Event when the underlying product was event-attached
                                type: string
                              taxAmount:
                                description: Optional tax for this line, minor units
                                type: integer
                                minimum: 0
                                maximum: 9007199254740991
                              productType:
                                description: Snapshot of the product type at line-creation time; drives post-payment fulfillment
                                type: string
                                enum:
                                  - product
                                  - add-on
                                  - bundle
                                  - donation
                                  - event-ticket
                              productName:
                                description: Snapshot of the product display name at line-creation time
                                type: string
                              components:
                                description: |-
                                  Snapshot of the bundle's components, flat-expanded by qty. Set
                                  only when `productType === "bundle"`. Carries each component's
                                  product id + display name + image URL + (when applicable) event
                                  + seating snapshot so the fulfillment pipeline can issue
                                  information-equivalent component tickets and the tickets PDF
                                  can render the legacy "ticket"-style block per item.
                                type: array
                                items:
                                  type: object
                                  properties:
                                    productId:
                                      type: string
                                    productName:
                                      type: string
                                    productType:
                                      description: >-
                                        Catalog product type for the component — drives sort + visual treatment in the
                                        rendered bundle items list.
                                      type: string
                                      enum:
                                        - product
                                        - add-on
                                        - bundle
                                        - donation
                                        - event-ticket
                                    productImageUrl:
                                      type: string
                                    eventId:
                                      description: >-
                                        Per-component parent event id — snapshotted onto the issued component ticket as
                                        legacy `event_id` so b2c availability and seat-occupation queries see the sale.
                                      type: string
                                    eventImageUrl:
                                      description: >-
                                        Component event hero image — fallback artwork for the pulled-out ticket card
                                        when the component product has no image.
                                      type: string
                                    eventName:
                                      type: string
                                    eventStart:
                                      description: ISO 8601 start datetime for the component's event/timeslot.
                                      type: string
                                      format: date-time
                                      pattern: >-
                                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                                    eventEnd:
                                      type: string
                                      format: date-time
                                      pattern: >-
                                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                                    eventLocation:
                                      type: string
                                    eventTimezone:
                                      description: >-
                                        IANA timezone identifier for the component event — drives printed-date
                                        localization on the pulled-out ticket.
                                      type: string
                                    seatingInformation:
                                      type: object
                                      properties:
                                        sectionId:
                                          description: Section display label (e.g. "A").
                                          type: string
                                        rowId:
                                          description: Row display label (e.g. "5").
                                          type: string
                                        seatId:
                                          description: Seat display label (e.g. "12").
                                          type: string
                                        seatReferenceId:
                                          type: string
                                        sectionReferenceId:
                                          type: string
                                        priceLevelId:
                                          type: string
                                      additionalProperties: false
                                      description: |-
                                        Slim venue seating assignment. The display labels (sectionId,
                                        rowId, seatId) are what the printed ticket shows; the reference
                                        ids are preserved for compatibility with the legacy seat-chart
                                        system.
                                  required:
                                    - productId
                                    - productName
                                  additionalProperties: false
                              disableQrCode:
                                description: |-
                                  Snapshot of the underlying `Product.disable_qr_code` flag.
                                  When true, the issued ticket renders a "No scan" badge on the PDF
                                  and skips QR generation. Donations are scannable by default unless
                                  the host opts the product out via this flag.
                                type: boolean
                              productImageUrl:
                                description: |-
                                  Snapshot of the underlying `Product.image` URL — rendered as
                                  the ticket-stub artwork on the issued PDF. Absent products fall
                                  back to the event image (when set), then to a typographic
                                  placeholder.
                                type: string
                              eventName:
                                description: Snapshot of the parent event's display name when the line was event-attached.
                                type: string
                              eventImageUrl:
                                description: |-
                                  Snapshot of the parent event's hero image URL — the renderer
                                  uses it as the ticket-stub artwork fallback when the product
                                  itself has no image.
                                type: string
                              eventStart:
                                description: ISO 8601 start datetime for the parent event (or per-occurrence timeslot).
                                type: string
                                format: date-time
                                pattern: >-
                                  ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                              eventEnd:
                                description: ISO 8601 end datetime for the parent event.
                                type: string
                                format: date-time
                                pattern: >-
                                  ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                              eventLocation:
                                description: Pre-formatted location label snapshotted at line creation.
                                type: string
                              eventTimezone:
                                description: |-
                                  IANA timezone identifier for the parent event (e.g.
                                  `America/Los_Angeles`). Drives printed-date localization
                                  so the holder sees the event-local time + TZ abbreviation.
                                type: string
                              seatingInformation:
                                description: |-
                                  Per-line venue seating assignment. Mirrors the legacy
                                  `seatingInformation` field on a ticket so the new tickets
                                  PDF prints the same seat info the legacy PDF did.
                                type: object
                                properties:
                                  sectionId:
                                    description: Section display label (e.g. "A").
                                    type: string
                                  rowId:
                                    description: Row display label (e.g. "5").
                                    type: string
                                  seatId:
                                    description: Seat display label (e.g. "12").
                                    type: string
                                  seatReferenceId:
                                    type: string
                                  sectionReferenceId:
                                    type: string
                                  priceLevelId:
                                    type: string
                                additionalProperties: false
                              inventoryConsumedAt:
                                description: |-
                                  Stamped by the fulfillment pipeline once
                                  `InventoryRepository.consume()` has succeeded for this
                                  line. Drives per-line consume idempotency: a replayed
                                  fulfillment skips already-stamped lines and runs consume
                                  on unstamped ones, so a partial-failure state (tickets
                                  persisted but consume threw) recovers without
                                  double-decrementing inventory.
                                type: string
                                format: date-time
                                pattern: >-
                                  ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                            required:
                              - description
                              - quantity
                              - unitAmount
                            additionalProperties: false
                        payments:
                          description: Audit log of every payment applied to this invoice
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              status:
                                type: string
                                enum:
                                  - succeeded
                                  - failed
                                description: |-
                                  Outcome of this payment attempt.
                                  - succeeded: money was captured. Counts toward the parent invoice's
                                  `amountPaid` total.
                                  - failed: an auto-charge attempt was rejected (decline / SCA / no
                                  card). Kept on the audit log for visibility; does NOT count
                                  toward `amountPaid`.
                              amount:
                                type: integer
                                minimum: 0
                                maximum: 9007199254740991
                                description: Amount applied, minor units
                              paidAt:
                                type: string
                                format: date-time
                                pattern: >-
                                  ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                              idempotencyKey:
                                description: Caller-supplied dedupe key, if one was provided
                                type: string
                              note:
                                description: Free-form note (payment method, upstream provider id, etc.)
                                type: string
                              externalId:
                                description: Stripe PaymentIntent id (`pi_…`) for Stripe-Connect payments
                                type: string
                              chargeId:
                                description: Stripe Charge id (`ch_…`); refund operations key off this
                                type: string
                              failureCode:
                                description: >-
                                  Stripe error code on a failed attempt (e.g. `card_declined`,
                                  `authentication_required`)
                                type: string
                              failureMessage:
                                description: Stripe customer-facing decline message on a failed attempt
                                type: string
                              refunds:
                                description: |-
                                  Refunds applied against this payment. Cumulative refunds are
                                  capped at `amount`; the host's true net = amount - sum(refunds).
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    amount:
                                      type: integer
                                      minimum: 0
                                      maximum: 9007199254740991
                                      description: Refund amount, minor units of the parent invoice currency
                                    refundedAt:
                                      type: string
                                      format: date-time
                                      pattern: >-
                                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                                    idempotencyKey:
                                      type: string
                                    reason:
                                      description: 'Stripe reason: duplicate | fraudulent | requested_by_customer'
                                      type: string
                                    note:
                                      description: Free-form host note (internal, not shown to customer)
                                      type: string
                                    externalRefundId:
                                      description: Stripe Refund id (`re_…`) for ops lookups
                                      type: string
                                    ledgerEntryId:
                                      description: Pointer to the matching Ledger row that drives payouts
                                      type: string
                                  required:
                                    - id
                                    - amount
                                    - refundedAt
                                  additionalProperties: false
                            required:
                              - id
                              - status
                              - amount
                              - paidAt
                            additionalProperties: false
                        subtotal:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: Sum of (qty * unitAmount), minor units
                        taxTotal:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: Sum of line taxAmount, minor units
                        total:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: subtotal + taxTotal, minor units
                        amountPaid:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: Sum of payments received, minor units
                        amountDue:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: total - amountPaid, clamped to >= 0
                        status:
                          type: string
                          enum:
                            - draft
                            - open
                            - payment_failed
                            - paid
                            - void
                          description: |-
                            Invoice lifecycle status.
                            - draft: not yet issued; freely editable
                            - open: finalized and issued; awaiting payment
                            - payment_failed: an off-session auto-charge attempt was rejected
                            (decline / SCA / no card). The invoice is still owed; the host
                            can retry the charge or the customer can pay manually.
                            - paid: fully paid
                            - void: cancelled before payment
                        autoCharge:
                          type: boolean
                          description: |-
                            When true, finalize attempts to off-session charge the customer's
                            saved card immediately. On charge success the invoice transitions
                            straight to `paid`; on failure to `payment_failed`. Default
                            false — host has to opt in.
                        notes:
                          type: string
                        taxIds:
                          description: |-
                            Snapshot of the host's registered tax-IDs at the time the invoice
                            was issued. Rendered alongside the host's company info on the PDF
                            and email body. Optional/empty when the host hasn't recorded any.
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                                description: |-
                                  Internal type code for the tax-ID (e.g. 'us_ein', 'ca_gst_hst', 'eu_vat').
                                  Display labels are derived at render time so the persisted invoice
                                  doesn't bake in a label that might be reworded.
                              value:
                                type: string
                                description: The tax-ID number as the host has it registered
                            required:
                              - type
                              - value
                            additionalProperties: false
                        issuedAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        dueAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        paidAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        voidedAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        subscriptionId:
                          description: Set when generated by a billing Subscription
                          type: string
                        quoteId:
                          description: Set when accepted from a Quote
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        updatedAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      additionalProperties: false
                  hasMore:
                    type: boolean
                required:
                  - data
                  - hasMore
                additionalProperties: false
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '403':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
    post:
      summary: Create Invoice
      tags:
        - Invoices
      description: >-
        Creates a new draft invoice. Totals are computed from line items. The invoice must be finalized before it is
        issued to the customer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerId:
                  type: string
                  description: CRM contact id of the recipient
                customerEmail:
                  description: >-
                    Snapshot of the recipient's email at create time. Stored on the invoice so the record stays complete
                    if the source contact is later deleted.
                  type: string
                customerFirstName:
                  description: Snapshot of the recipient's first name at create time
                  type: string
                customerLastName:
                  description: Snapshot of the recipient's last name at create time
                  type: string
                customerPhone:
                  description: Snapshot of the recipient's phone at create time
                  type: string
                currency:
                  type: string
                  enum:
                    - USD
                    - CAD
                  description: Three-letter ISO code; all line amounts must be in this currency
                lineItems:
                  minItems: 1
                  type: array
                  items:
                    type: object
                    properties:
                      description:
                        type: string
                        description: Human-readable description shown on the invoice
                      quantity:
                        type: integer
                        minimum: 1
                        maximum: 9007199254740991
                        description: Whole units billed
                      unitAmount:
                        type: integer
                        minimum: 0
                        maximum: 9007199254740991
                        description: Per-unit price in the invoice currency, minor units (cents for USD)
                      productId:
                        description: Optional reference to a Product in the catalog
                        type: string
                      priceId:
                        description: Optional reference to the Price doc that backed this line (subscription billing)
                        type: string
                      eventId:
                        description: Optional reference to an Event when the underlying product was event-attached
                        type: string
                      taxAmount:
                        description: Optional tax for this line, minor units
                        type: integer
                        minimum: 0
                        maximum: 9007199254740991
                      productType:
                        description: Snapshot of the product type at line-creation time; drives post-payment fulfillment
                        type: string
                        enum:
                          - product
                          - add-on
                          - bundle
                          - donation
                          - event-ticket
                      productName:
                        description: Snapshot of the product display name at line-creation time
                        type: string
                      components:
                        description: |-
                          Snapshot of the bundle's components, flat-expanded by qty. Set
                          only when `productType === "bundle"`. Carries each component's
                          product id + display name + image URL + (when applicable) event
                          + seating snapshot so the fulfillment pipeline can issue
                          information-equivalent component tickets and the tickets PDF
                          can render the legacy "ticket"-style block per item.
                        type: array
                        items:
                          type: object
                          properties:
                            productId:
                              type: string
                            productName:
                              type: string
                            productType:
                              description: >-
                                Catalog product type for the component — drives sort + visual treatment in the rendered
                                bundle items list.
                              type: string
                              enum:
                                - product
                                - add-on
                                - bundle
                                - donation
                                - event-ticket
                            productImageUrl:
                              type: string
                            eventId:
                              description: >-
                                Per-component parent event id — snapshotted onto the issued component ticket as legacy
                                `event_id` so b2c availability and seat-occupation queries see the sale.
                              type: string
                            eventImageUrl:
                              description: >-
                                Component event hero image — fallback artwork for the pulled-out ticket card when the
                                component product has no image.
                              type: string
                            eventName:
                              type: string
                            eventStart:
                              description: ISO 8601 start datetime for the component's event/timeslot.
                              type: string
                              format: date-time
                              pattern: >-
                                ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                            eventEnd:
                              type: string
                              format: date-time
                              pattern: >-
                                ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                            eventLocation:
                              type: string
                            eventTimezone:
                              description: >-
                                IANA timezone identifier for the component event — drives printed-date localization on
                                the pulled-out ticket.
                              type: string
                            seatingInformation:
                              type: object
                              properties:
                                sectionId:
                                  description: Section display label (e.g. "A").
                                  type: string
                                rowId:
                                  description: Row display label (e.g. "5").
                                  type: string
                                seatId:
                                  description: Seat display label (e.g. "12").
                                  type: string
                                seatReferenceId:
                                  type: string
                                sectionReferenceId:
                                  type: string
                                priceLevelId:
                                  type: string
                              description: |-
                                Slim venue seating assignment. The display labels (sectionId,
                                rowId, seatId) are what the printed ticket shows; the reference
                                ids are preserved for compatibility with the legacy seat-chart
                                system.
                          required:
                            - productId
                            - productName
                      disableQrCode:
                        description: |-
                          Snapshot of the underlying `Product.disable_qr_code` flag.
                          When true, the issued ticket renders a "No scan" badge on the PDF
                          and skips QR generation. Donations are scannable by default unless
                          the host opts the product out via this flag.
                        type: boolean
                      productImageUrl:
                        description: |-
                          Snapshot of the underlying `Product.image` URL — rendered as
                          the ticket-stub artwork on the issued PDF. Absent products fall
                          back to the event image (when set), then to a typographic
                          placeholder.
                        type: string
                      eventName:
                        description: Snapshot of the parent event's display name when the line was event-attached.
                        type: string
                      eventImageUrl:
                        description: |-
                          Snapshot of the parent event's hero image URL — the renderer
                          uses it as the ticket-stub artwork fallback when the product
                          itself has no image.
                        type: string
                      eventStart:
                        description: ISO 8601 start datetime for the parent event (or per-occurrence timeslot).
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      eventEnd:
                        description: ISO 8601 end datetime for the parent event.
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      eventLocation:
                        description: Pre-formatted location label snapshotted at line creation.
                        type: string
                      eventTimezone:
                        description: |-
                          IANA timezone identifier for the parent event (e.g.
                          `America/Los_Angeles`). Drives printed-date localization
                          so the holder sees the event-local time + TZ abbreviation.
                        type: string
                      seatingInformation:
                        description: |-
                          Per-line venue seating assignment. Mirrors the legacy
                          `seatingInformation` field on a ticket so the new tickets
                          PDF prints the same seat info the legacy PDF did.
                        type: object
                        properties:
                          sectionId:
                            description: Section display label (e.g. "A").
                            type: string
                          rowId:
                            description: Row display label (e.g. "5").
                            type: string
                          seatId:
                            description: Seat display label (e.g. "12").
                            type: string
                          seatReferenceId:
                            type: string
                          sectionReferenceId:
                            type: string
                          priceLevelId:
                            type: string
                      inventoryConsumedAt:
                        description: |-
                          Stamped by the fulfillment pipeline once
                          `InventoryRepository.consume()` has succeeded for this
                          line. Drives per-line consume idempotency: a replayed
                          fulfillment skips already-stamped lines and runs consume
                          on unstamped ones, so a partial-failure state (tickets
                          persisted but consume threw) recovers without
                          double-decrementing inventory.
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    required:
                      - description
                      - quantity
                      - unitAmount
                  description: At least one line item is required
                notes:
                  type: string
                taxIds:
                  description: Optional host tax-ID snapshot stored on the invoice. Rendered on the issued PDF and email.
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: |-
                          Internal type code for the tax-ID (e.g. 'us_ein', 'ca_gst_hst', 'eu_vat').
                          Display labels are derived at render time so the persisted invoice
                          doesn't bake in a label that might be reworded.
                      value:
                        type: string
                        description: The tax-ID number as the host has it registered
                    required:
                      - type
                      - value
                dueAt:
                  description: Optional payment due date
                  type: string
                  format: date-time
                  pattern: >-
                    ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                subscriptionId:
                  description: Set when generated by a billing Subscription
                  type: string
                quoteId:
                  description: Set when accepted from a Quote
                  type: string
                autoCharge:
                  description: |-
                    Opt the invoice into off-session auto-charge. When true, the
                    `auto_charge` endpoint can attempt to charge the customer's
                    saved card on file without further user interaction. Stored on
                    the draft; the host can flip this on/off through revise before
                    finalize. Default false.
                  type: boolean
              required:
                - customerId
                - currency
                - lineItems
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      hostId:
                        type: string
                      customerId:
                        type: string
                        description: CRM contact id of the recipient
                      customerEmail:
                        description: Snapshot of the recipient's email captured at create time
                        type: string
                      customerFirstName:
                        description: Snapshot of the recipient's first name captured at create time
                        type: string
                      customerLastName:
                        description: Snapshot of the recipient's last name captured at create time
                        type: string
                      customerPhone:
                        description: Snapshot of the recipient's phone captured at create time
                        type: string
                      number:
                        anyOf:
                          - type: string
                          - nullable: true
                            enum:
                              - null
                        description: Sequential invoice number; null while in draft
                      currency:
                        type: string
                        enum:
                          - USD
                          - CAD
                      lineItems:
                        type: array
                        items:
                          type: object
                          properties:
                            description:
                              type: string
                              description: Human-readable description shown on the invoice
                            quantity:
                              type: integer
                              minimum: 1
                              maximum: 9007199254740991
                              description: Whole units billed
                            unitAmount:
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                              description: Per-unit price in the invoice currency, minor units (cents for USD)
                            productId:
                              description: Optional reference to a Product in the catalog
                              type: string
                            priceId:
                              description: Optional reference to the Price doc that backed this line (subscription billing)
                              type: string
                            eventId:
                              description: Optional reference to an Event when the underlying product was event-attached
                              type: string
                            taxAmount:
                              description: Optional tax for this line, minor units
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                            productType:
                              description: Snapshot of the product type at line-creation time; drives post-payment fulfillment
                              type: string
                              enum:
                                - product
                                - add-on
                                - bundle
                                - donation
                                - event-ticket
                            productName:
                              description: Snapshot of the product display name at line-creation time
                              type: string
                            components:
                              description: |-
                                Snapshot of the bundle's components, flat-expanded by qty. Set
                                only when `productType === "bundle"`. Carries each component's
                                product id + display name + image URL + (when applicable) event
                                + seating snapshot so the fulfillment pipeline can issue
                                information-equivalent component tickets and the tickets PDF
                                can render the legacy "ticket"-style block per item.
                              type: array
                              items:
                                type: object
                                properties:
                                  productId:
                                    type: string
                                  productName:
                                    type: string
                                  productType:
                                    description: >-
                                      Catalog product type for the component — drives sort + visual treatment in the
                                      rendered bundle items list.
                                    type: string
                                    enum:
                                      - product
                                      - add-on
                                      - bundle
                                      - donation
                                      - event-ticket
                                  productImageUrl:
                                    type: string
                                  eventId:
                                    description: >-
                                      Per-component parent event id — snapshotted onto the issued component ticket as
                                      legacy `event_id` so b2c availability and seat-occupation queries see the sale.
                                    type: string
                                  eventImageUrl:
                                    description: >-
                                      Component event hero image — fallback artwork for the pulled-out ticket card when
                                      the component product has no image.
                                    type: string
                                  eventName:
                                    type: string
                                  eventStart:
                                    description: ISO 8601 start datetime for the component's event/timeslot.
                                    type: string
                                    format: date-time
                                    pattern: >-
                                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                                  eventEnd:
                                    type: string
                                    format: date-time
                                    pattern: >-
                                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                                  eventLocation:
                                    type: string
                                  eventTimezone:
                                    description: >-
                                      IANA timezone identifier for the component event — drives printed-date
                                      localization on the pulled-out ticket.
                                    type: string
                                  seatingInformation:
                                    type: object
                                    properties:
                                      sectionId:
                                        description: Section display label (e.g. "A").
                                        type: string
                                      rowId:
                                        description: Row display label (e.g. "5").
                                        type: string
                                      seatId:
                                        description: Seat display label (e.g. "12").
                                        type: string
                                      seatReferenceId:
                                        type: string
                                      sectionReferenceId:
                                        type: string
                                      priceLevelId:
                                        type: string
                                    additionalProperties: false
                                    description: |-
                                      Slim venue seating assignment. The display labels (sectionId,
                                      rowId, seatId) are what the printed ticket shows; the reference
                                      ids are preserved for compatibility with the legacy seat-chart
                                      system.
                                required:
                                  - productId
                                  - productName
                                additionalProperties: false
                            disableQrCode:
                              description: |-
                                Snapshot of the underlying `Product.disable_qr_code` flag.
                                When true, the issued ticket renders a "No scan" badge on the PDF
                                and skips QR generation. Donations are scannable by default unless
                                the host opts the product out via this flag.
                              type: boolean
                            productImageUrl:
                              description: |-
                                Snapshot of the underlying `Product.image` URL — rendered as
                                the ticket-stub artwork on the issued PDF. Absent products fall
                                back to the event image (when set), then to a typographic
                                placeholder.
                              type: string
                            eventName:
                              description: Snapshot of the parent event's display name when the line was event-attached.
                              type: string
                            eventImageUrl:
                              description: |-
                                Snapshot of the parent event's hero image URL — the renderer
                                uses it as the ticket-stub artwork fallback when the product
                                itself has no image.
                              type: string
                            eventStart:
                              description: ISO 8601 start datetime for the parent event (or per-occurrence timeslot).
                              type: string
                              format: date-time
                              pattern: >-
                                ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                            eventEnd:
                              description: ISO 8601 end datetime for the parent event.
                              type: string
                              format: date-time
                              pattern: >-
                                ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                            eventLocation:
                              description: Pre-formatted location label snapshotted at line creation.
                              type: string
                            eventTimezone:
                              description: |-
                                IANA timezone identifier for the parent event (e.g.
                                `America/Los_Angeles`). Drives printed-date localization
                                so the holder sees the event-local time + TZ abbreviation.
                              type: string
                            seatingInformation:
                              description: |-
                                Per-line venue seating assignment. Mirrors the legacy
                                `seatingInformation` field on a ticket so the new tickets
                                PDF prints the same seat info the legacy PDF did.
                              type: object
                              properties:
                                sectionId:
                                  description: Section display label (e.g. "A").
                                  type: string
                                rowId:
                                  description: Row display label (e.g. "5").
                                  type: string
                                seatId:
                                  description: Seat display label (e.g. "12").
                                  type: string
                                seatReferenceId:
                                  type: string
                                sectionReferenceId:
                                  type: string
                                priceLevelId:
                                  type: string
                              additionalProperties: false
                            inventoryConsumedAt:
                              description: |-
                                Stamped by the fulfillment pipeline once
                                `InventoryRepository.consume()` has succeeded for this
                                line. Drives per-line consume idempotency: a replayed
                                fulfillment skips already-stamped lines and runs consume
                                on unstamped ones, so a partial-failure state (tickets
                                persisted but consume threw) recovers without
                                double-decrementing inventory.
                              type: string
                              format: date-time
                              pattern: >-
                                ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                          required:
                            - description
                            - quantity
                            - unitAmount
                          additionalProperties: false
                      payments:
                        description: Audit log of every payment applied to this invoice
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            status:
                              type: string
                              enum:
                                - succeeded
                                - failed
                              description: |-
                                Outcome of this payment attempt.
                                - succeeded: money was captured. Counts toward the parent invoice's
                                `amountPaid` total.
                                - failed: an auto-charge attempt was rejected (decline / SCA / no
                                card). Kept on the audit log for visibility; does NOT count
                                toward `amountPaid`.
                            amount:
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                              description: Amount applied, minor units
                            paidAt:
                              type: string
                              format: date-time
                              pattern: >-
                                ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                            idempotencyKey:
                              description: Caller-supplied dedupe key, if one was provided
                              type: string
                            note:
                              description: Free-form note (payment method, upstream provider id, etc.)
                              type: string
                            externalId:
                              description: Stripe PaymentIntent id (`pi_…`) for Stripe-Connect payments
                              type: string
                            chargeId:
                              description: Stripe Charge id (`ch_…`); refund operations key off this
                              type: string
                            failureCode:
                              description: Stripe error code on a failed attempt (e.g. `card_declined`, `authentication_required`)
                              type: string
                            failureMessage:
                              description: Stripe customer-facing decline message on a failed attempt
                              type: string
                            refunds:
                              description: |-
                                Refunds applied against this payment. Cumulative refunds are
                                capped at `amount`; the host's true net = amount - sum(refunds).
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  amount:
                                    type: integer
                                    minimum: 0
                                    maximum: 9007199254740991
                                    description: Refund amount, minor units of the parent invoice currency
                                  refundedAt:
                                    type: string
                                    format: date-time
                                    pattern: >-
                                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                                  idempotencyKey:
                                    type: string
                                  reason:
                                    description: 'Stripe reason: duplicate | fraudulent | requested_by_customer'
                                    type: string
                                  note:
                                    description: Free-form host note (internal, not shown to customer)
                                    type: string
                                  externalRefundId:
                                    description: Stripe Refund id (`re_…`) for ops lookups
                                    type: string
                                  ledgerEntryId:
                                    description: Pointer to the matching Ledger row that drives payouts
                                    type: string
                                required:
                                  - id
                                  - amount
                                  - refundedAt
                                additionalProperties: false
                          required:
                            - id
                            - status
                            - amount
                            - paidAt
                          additionalProperties: false
                      subtotal:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: Sum of (qty * unitAmount), minor units
                      taxTotal:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: Sum of line taxAmount, minor units
                      total:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: subtotal + taxTotal, minor units
                      amountPaid:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: Sum of payments received, minor units
                      amountDue:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: total - amountPaid, clamped to >= 0
                      status:
                        type: string
                        enum:
                          - draft
                          - open
                          - payment_failed
                          - paid
                          - void
                        description: |-
                          Invoice lifecycle status.
                          - draft: not yet issued; freely editable
                          - open: finalized and issued; awaiting payment
                          - payment_failed: an off-session auto-charge attempt was rejected
                          (decline / SCA / no card). The invoice is still owed; the host
                          can retry the charge or the customer can pay manually.
                          - paid: fully paid
                          - void: cancelled before payment
                      autoCharge:
                        type: boolean
                        description: |-
                          When true, finalize attempts to off-session charge the customer's
                          saved card immediately. On charge success the invoice transitions
                          straight to `paid`; on failure to `payment_failed`. Default
                          false — host has to opt in.
                      notes:
                        type: string
                      taxIds:
                        description: |-
                          Snapshot of the host's registered tax-IDs at the time the invoice
                          was issued. Rendered alongside the host's company info on the PDF
                          and email body. Optional/empty when the host hasn't recorded any.
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              description: |-
                                Internal type code for the tax-ID (e.g. 'us_ein', 'ca_gst_hst', 'eu_vat').
                                Display labels are derived at render time so the persisted invoice
                                doesn't bake in a label that might be reworded.
                            value:
                              type: string
                              description: The tax-ID number as the host has it registered
                          required:
                            - type
                            - value
                          additionalProperties: false
                      issuedAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      dueAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      paidAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      voidedAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      subscriptionId:
                        description: Set when generated by a billing Subscription
                        type: string
                      quoteId:
                        description: Set when accepted from a Quote
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      updatedAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    additionalProperties: false
                required:
                  - data
                additionalProperties: false
        '400':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '403':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
  /v1/invoices/{id}:
    get:
      summary: Get Invoice
      tags:
        - Invoices
      description: Retrieves a single invoice by id.
      parameters:
        - schema:
            type: string
          in: query
          name: fields
          required: false
          description: >-
            Comma-separated list of fields to return. Valid: id, hostId, customerId, customerEmail, customerFirstName,
            customerLastName, customerPhone, number, currency, lineItems, payments, subtotal, taxTotal, total,
            amountPaid, amountDue, status, autoCharge, notes, taxIds, issuedAt, dueAt, paidAt, voidedAt, subscriptionId,
            quoteId, createdAt, updatedAt. Omit for all fields.
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: Invoice id, discoverable via list_invoices
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      hostId:
                        type: string
                      customerId:
                        type: string
                        description: CRM contact id of the recipient
                      customerEmail:
                        description: Snapshot of the recipient's email captured at create time
                        type: string
                      customerFirstName:
                        description: Snapshot of the recipient's first name captured at create time
                        type: string
                      customerLastName:
                        description: Snapshot of the recipient's last name captured at create time
                        type: string
                      customerPhone:
                        description: Snapshot of the recipient's phone captured at create time
                        type: string
                      number:
                        anyOf:
                          - type: string
                          - nullable: true
                            enum:
                              - null
                        description: Sequential invoice number; null while in draft
                      currency:
                        type: string
                        enum:
                          - USD
                          - CAD
                      lineItems:
                        type: array
                        items:
                          type: object
                          properties:
                            description:
                              type: string
                              description: Human-readable description shown on the invoice
                            quantity:
                              type: integer
                              minimum: 1
                              maximum: 9007199254740991
                              description: Whole units billed
                            unitAmount:
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                              description: Per-unit price in the invoice currency, minor units (cents for USD)
                            productId:
                              description: Optional reference to a Product in the catalog
                              type: string
                            priceId:
                              description: Optional reference to the Price doc that backed this line (subscription billing)
                              type: string
                            eventId:
                              description: Optional reference to an Event when the underlying product was event-attached
                              type: string
                            taxAmount:
                              description: Optional tax for this line, minor units
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                            productType:
                              description: Snapshot of the product type at line-creation time; drives post-payment fulfillment
                              type: string
                              enum:
                                - product
                                - add-on
                                - bundle
                                - donation
                                - event-ticket
                            productName:
                              description: Snapshot of the product display name at line-creation time
                              type: string
                            components:
                              description: |-
                                Snapshot of the bundle's components, flat-expanded by qty. Set
                                only when `productType === "bundle"`. Carries each component's
                                product id + display name + image URL + (when applicable) event
                                + seating snapshot so the fulfillment pipeline can issue
                                information-equivalent component tickets and the tickets PDF
                                can render the legacy "ticket"-style block per item.
                              type: array
                              items:
                                type: object
                                properties:
                                  productId:
                                    type: string
                                  productName:
                                    type: string
                                  productType:
                                    description: >-
                                      Catalog product type for the component — drives sort + visual treatment in the
                                      rendered bundle items list.
                                    type: string
                                    enum:
                                      - product
                                      - add-on
                                      - bundle
                                      - donation
                                      - event-ticket
                                  productImageUrl:
                                    type: string
                                  eventId:
                                    description: >-
                                      Per-component parent event id — snapshotted onto the issued component ticket as
                                      legacy `event_id` so b2c availability and seat-occupation queries see the sale.
                                    type: string
                                  eventImageUrl:
                                    description: >-
                                      Component event hero image — fallback artwork for the pulled-out ticket card when
                                      the component product has no image.
                                    type: string
                                  eventName:
                                    type: string
                                  eventStart:
                                    description: ISO 8601 start datetime for the component's event/timeslot.
                                    type: string
                                    format: date-time
                                    pattern: >-
                                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                                  eventEnd:
                                    type: string
                                    format: date-time
                                    pattern: >-
                                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                                  eventLocation:
                                    type: string
                                  eventTimezone:
                                    description: >-
                                      IANA timezone identifier for the component event — drives printed-date
                                      localization on the pulled-out ticket.
                                    type: string
                                  seatingInformation:
                                    type: object
                                    properties:
                                      sectionId:
                                        description: Section display label (e.g. "A").
                                        type: string
                                      rowId:
                                        description: Row display label (e.g. "5").
                                        type: string
                                      seatId:
                                        description: Seat display label (e.g. "12").
                                        type: string
                                      seatReferenceId:
                                        type: string
                                      sectionReferenceId:
                                        type: string
                                      priceLevelId:
                                        type: string
                                    additionalProperties: false
                                    description: |-
                                      Slim venue seating assignment. The display labels (sectionId,
                                      rowId, seatId) are what the printed ticket shows; the reference
                                      ids are preserved for compatibility with the legacy seat-chart
                                      system.
                                required:
                                  - productId
                                  - productName
                                additionalProperties: false
                            disableQrCode:
                              description: |-
                                Snapshot of the underlying `Product.disable_qr_code` flag.
                                When true, the issued ticket renders a "No scan" badge on the PDF
                                and skips QR generation. Donations are scannable by default unless
                                the host opts the product out via this flag.
                              type: boolean
                            productImageUrl:
                              description: |-
                                Snapshot of the underlying `Product.image` URL — rendered as
                                the ticket-stub artwork on the issued PDF. Absent products fall
                                back to the event image (when set), then to a typographic
                                placeholder.
                              type: string
                            eventName:
                              description: Snapshot of the parent event's display name when the line was event-attached.
                              type: string
                            eventImageUrl:
                              description: |-
                                Snapshot of the parent event's hero image URL — the renderer
                                uses it as the ticket-stub artwork fallback when the product
                                itself has no image.
                              type: string
                            eventStart:
                              description: ISO 8601 start datetime for the parent event (or per-occurrence timeslot).
                              type: string
                              format: date-time
                              pattern: >-
