  /v1/newsletters/:
    get:
      summary: List Newsletters
      tags:
        - Newsletters
      description: |-
        Lists the workspace's newsletters, optionally filtered by view (draft / past).
        Paginated; returns recipient-stripped summaries so list payloads stay small.
        Sorted by updatedAt descending.
      parameters:
        - schema:
            type: string
            enum:
              - past
              - sent
              - scheduled
              - draft
          in: query
          name: view
          required: false
          description: Filter by view; omit to include drafts + sent + scheduled.
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: pageNumber
          required: false
          description: Page number (0-based, default 0)
        - schema:
            default: 20
            type: integer
            minimum: 1
            maximum: 100
          in: query
          name: pageSize
          required: false
          description: Items per page (default 20, max 100)
        - schema:
            type: string
            enum:
              - _id
              - subject
              - sent
              - date_sent
              - recipient_count
              - automatic
              - sync_event_recipients
              - data_version
              - createdAt
              - updatedAt
          in: query
          name: sortField
          required: false
          description: Field to sort results by. Omit for default (updatedAt descending).
        - schema:
            type: string
            enum:
              - asc
              - desc
          in: query
          name: sortDirection
          required: false
          description: Sort direction. Defaults to desc when sortField is provided.
        - schema:
            type: string
          in: query
          name: filters
          required: false
          description: |-
            JSON-encoded FilterGroup[] for custom filtering. Conditions
            referencing fields outside the persisted newsletter schema are
            silently ignored. ANDed with the 'view' filter when both are
            supplied.
        - schema:
            type: string
          in: query
          name: fields
          required: false
          description: >-
            Comma-separated list of fields to return. Valid: id, hostId, subject, sent, date_sent, recipient_count,
            reply_to_email, display_name, automatic, data_version, sync_event_recipients, createdAt, updatedAt,
            sparkpost_metrics, attachments. Omit for all fields.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        hostId:
                          type: string
                        subject:
                          type: string
                        body:
                          description: Rendered HTML — empty for drafts
                          type: string
                        sent:
                          type: boolean
                          description: False for drafts, true for sent / scheduled
                        recipient_phonenumbers:
                          type: array
                          items:
                            type: string
                        event_refs:
                          type: array
                          items:
                            type: string
                        timeslot_refs:
                          type: array
                          items:
                            type: string
                        date_sent:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        footer_image:
                          type: string
                        reply_to_email:
                          type: string
                        automatic:
                          type: boolean
                        display_name:
                          type: string
                        content_blocks:
                          description: Deprecated legacy content shape; new newsletters use viewport_data
                          type: array
                          items: {}
                        viewport_data:
                          description: Site-builder viewport_data — structured email content rendered to HTML by the send pipeline
                        data_version:
                          anyOf:
                            - type: number
                              enum:
                                - 0
                            - type: number
                              enum:
                                - 1
                          description: |-
                            Content storage discriminator.
                            - 0 (CONTENT_BLOCKS, deprecated): legacy content_blocks array
                            - 1 (VIEWPORT_DATA): site-builder viewport_data shape
                        sync_event_recipients:
                          type: boolean
                        recipient_count:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                        attachments:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                                description: Original filename
                              size:
                                type: integer
                                minimum: 0
                                maximum: 9007199254740991
                                description: File size in bytes
                              url:
                                type: string
                                description: Publicly fetchable URL (Firebase Storage download URL in practice)
                              type:
                                type: string
                                description: MIME type
                              uploading:
                                description: True while the attachment upload is in progress; false or omit once it finishes
                                type: boolean
                              uploadError:
                                description: Surfaced when an attachment upload failed
                                type: string
                              storagePath:
                                description: Firebase Storage path for deletion
                                type: string
                            required:
                              - name
                              - size
                              - url
                              - type
                            additionalProperties: false
                        sparkpost_metrics:
                          type: object
                          properties:
                            count_sent:
                              type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            count_delivered:
                              type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            count_opens:
                              type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            count_clicks:
                              type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            count_bounce:
                              type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            count_unsubscribe:
                              type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            bounce_rate:
                              type: string
                              description: Pre-formatted percentage, e.g. "2.3%"
                            open_rate:
                              type: string
                            click_rate:
                              type: string
                            revenue_generated:
                              description: Revenue attributed via referral tracking, minor units
                              type: integer
                              minimum: -9007199254740991
                              maximum: 9007199254740991
                            fetched_at:
                              description: Epoch ms when these metrics were last fetched from Sparkpost
                              type: number
                          required:
                            - count_sent
                            - count_delivered
                            - count_opens
                            - count_clicks
                            - count_bounce
                            - count_unsubscribe
                            - bounce_rate
                            - open_rate
                            - click_rate
                          additionalProperties: false
                        createdAt:
                          type: number
                          description: Creation timestamp, ms since epoch
                        updatedAt:
                          type: number
                          description: Last-updated timestamp, ms since epoch
                      additionalProperties: false
                  hasMore:
                    type: boolean
                  pageNumber:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  pageSize:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                required:
                  - data
                  - hasMore
                  - pageNumber
                  - pageSize
                additionalProperties: false
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '403':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
