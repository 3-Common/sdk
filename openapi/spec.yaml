  /v1/referrals/:
    get:
      summary: List Referrals
      tags:
        - Referrals
      description: |-
        Lists the workspace's referral links with view / revenue / ticket
        totals per row.
        Render rows using these precomputed fields — don't reformat the
        raw ones:
        - 'display_name'   — name column. Never show 'label' directly.
        - 'category_label' — kind column. e.g. "Newsletter tracking link",
        "Event tracking link", "Meta Pixel".
        - 'event_name'     — event title when the referral points at an event.
        - 'newsletter_subject' — newsletter subject (newsletter referrals only).
        Optional filters: event_id, type, newsletter_tracking_links.
      parameters:
        - schema:
            type: string
          in: query
          name: event_id
          required: false
          description: Narrow to one event
        - schema:
            type: string
            enum:
              - user
              - event
              - facebook-pixel
          in: query
          name: type
          required: false
          description: Narrow to one referral type
        - schema:
            type: boolean
          in: query
          name: newsletter_tracking_links
          required: false
          description: |-
            true → only newsletter-generated referrals.
            false → only manual referrals.
            omit → both.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        hostId:
                          type: string
                        label:
                          type: string
                        type:
                          type: string
                          enum:
                            - user
                            - event
                            - facebook-pixel
                          description: |-
                            Referral kind.
                            - user: generic per-host link (rare today)
                            - event: tied to one event id; revenue join keys off these
                            - facebook-pixel: fb pixel association, no view tracking
                        event_id:
                          type: string
                        pixel_id:
                          type: string
                        apply_to_all_events:
                          type: boolean
                        newsletter_tracking_links:
                          description: True when this referral was generated by the newsletter send flow
                          type: boolean
                        createdAt:
                          type: number
                          description: Creation timestamp, ms since epoch
                        updatedAt:
                          type: number
                          description: Last-updated timestamp, ms since epoch
                        views:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: Count of view rows attached to this referral
                        revenue:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: Sum of purchase view value, in cents
                        tickets:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: Sum of purchase view ticket qty
                        event_name:
                          description: >-
                            Resolved event title for event referrals. Absent when the event was deleted or never
                            existed.
                          type: string
                        newsletter_subject:
                          description: >-
                            Resolved newsletter subject when newsletter_tracking_links=true (the label IS the newsletter
                            id). Absent when the newsletter was deleted.
                          type: string
                        category:
                          type: string
                          enum:
                            - newsletter
                            - event
                            - facebook-pixel
                            - user
                          description: >-
                            Machine-readable classification. For user-facing rendering use

                            'category_label' instead. Derived from type + newsletter_tracking_links:

                            - "newsletter":     link auto-created by a newsletter send (type='event' AND
                            newsletter_tracking_links=true)

                            - "event":          manual per-event tracking link

                            - "facebook-pixel": Meta pixel

                            - "user":           legacy per-host link
                        category_label:
                          type: string
                          description: |-
                            Pre-formatted human-readable category. ALWAYS use this when
                            rendering the row's kind to a user — don't reformat 'category'
                            yourself.
                            - "Newsletter tracking link"
                            - "Event tracking link"
                            - "Meta Pixel"
                            - "User tracking link"
                        display_name:
                          type: string
                          description: >-
                            Human-readable name for this referral. ALWAYS use this when

                            rendering the referral to a user — NEVER show 'label' directly,

                            because for newsletter referrals it's the newsletter id (an opaque

                            ObjectId). Resolution:

                            - newsletter referrals  → newsletter_subject (or "(deleted newsletter)" when the newsletter
                            was removed)

                            - facebook-pixel       → pixel_id (or label when pixel_id missing)

                            - event / user         → label
                      required:
                        - id
                        - hostId
                        - label
                        - type
                        - createdAt
                        - updatedAt
                        - views
                        - revenue
                        - tickets
                        - category
