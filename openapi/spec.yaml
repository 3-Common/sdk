  /v1/newsletters/{id}/events:
    get:
      summary: List Newsletter Email Events
      tags:
        - Newsletters
      description: |-
        Lists Sparkpost bounce or open events for a sent newsletter. Returns
        one cursor-paginated page. Events outside the (date_sent - 1 day, now
        + 1 day) window aren't returned even if Sparkpost has them.
      parameters:
        - schema:
            type: string
            enum:
              - bounce
              - open
          in: query
          name: event
          required: true
          description: |-
            Sparkpost event class to fetch.
            - bounce: hard/soft bounce, with reason + error code
            - open: unique open events
        - schema:
            type: string
          in: query
          name: cursor
          required: false
          description: Sparkpost cursor token; omit for the first page
        - schema:
            default: 50
            type: integer
            minimum: 1
            maximum: 100
          in: query
          name: pageSize
          required: false
          description: Items per page (default 50, max 100)
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: Newsletter id, discoverable via list_newsletters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        recipient:
                          type: string
                        event_type:
                          type: string
                        timestamp:
                          type: string
                        bounce_class:
                          type: string
                        error_code:
                          type: string
                        reason:
                          type: string
                        user_agent:
                          type: string
                        ip:
                          type: string
                        click_tracking:
                          type: boolean
                      required:
                        - recipient
                        - event_type
                        - timestamp
                      additionalProperties: false
                  hasMore:
                    type: boolean
                  cursor:
                    type: string
                  nextCursor:
                    anyOf:
                      - type: string
                      - nullable: true
                        enum:
