  /v1/forms/{formId}/elements:
    post:
      summary: Add Form Element
      tags:
        - Forms
      description: |-
        Add a new element to a form. For order forms, the element is appended to the
        buyer section. Otherwise, it is appended to the end of the form.
        A layout row for the element is created automatically, and the form is saved
        after the element is added. The new element is returned.
