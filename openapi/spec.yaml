        - schema:
            type: string
          in: query
          name: fields
          required: false
          description: >-
            Comma-separated list of fields to return. Valid: id, name, type, description, descriptionBlocks, schedule,
            start, end, multiDayStartTimes, multiDayEndTimes, status, itemsSold, revenueCents, minPriceCents,
            maxPriceCents, currency, timeZone, isPublic, isVirtual, location, locationPlaceholder, virtualEventLink,
            venueName, image, images, tags, customTags, contentBlocks, language, isCancelled, redirectUrl, customTerms,
            createdAt, updatedAt. Omit for all fields.
