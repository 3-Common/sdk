                                      sectionId:
                                        description: Section display label (e.g. "A").
                                        type: string
                                      rowId:
                                        description: Row display label (e.g. "5").
                                        type: string
                                      seatId:
                                        description: Seat display label (e.g. "12").
                                        type: string
                                      seatReferenceId:
                                        type: string
                                      sectionReferenceId:
                                        type: string
                                      priceLevelId:
                                        type: string
