    post:
      summary: Create Subscription
      tags:
        - Subscriptions
      description: >-
        Creates a new subscription against an active recurring Price. Starts in `trialing` if trialDays is set, else
        `incomplete` (awaiting first payment).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                priceId:
                  description: Single-item shortcut. Use this OR `items[]`. Must be active + recurring.
                  type: string
                quantity:
                  description: Number of units of the priceId shortcut (default 1).
                  type: integer
                  minimum: 1
                  maximum: 9007199254740991
                items:
                  description: >-
                    Multi-item path. Each item references a recurring Price; all items must share the same recurring
                    cycle and currency (Phase 1).
                  type: array
                  items:
                    type: object
                    properties:
                      priceId:
                        type: string
                      quantity:
                        type: integer
                        minimum: 1
                        maximum: 9007199254740991
                    required:
                      - priceId
                contactId:
                  description: CRM contact id; optional if customerEmail provided
                  type: string
                customerEmail:
                  description: Email for late linking when contactId is unknown
                  type: string
                trialDays:
                  description: Trial length in days; omit/0 for no trial. Mutually exclusive with billingCycleAnchor.
                  type: integer
                  minimum: 0
                  maximum: 9007199254740991
                billingCycleAnchor:
                  description: >-
                    Absolute first-billing date; when set (and in the future), the first paid cycle begins on this date
                    and the sub is in trialing until then. Mutually exclusive with trialDays.
                  type: string
                  format: date-time
                  pattern: >-
                    ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                cancelAt:
                  description: Absolute scheduled end date; the sub auto-cancels on the renewal pass once now >= cancelAt.
                  type: string
                  format: date-time
                  pattern: >-
                    ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                dunningEnabled:
                  description: >-
                    Defaults to true. When false, a failed renewal payment marks the subscription unpaid immediately
                    with no past-due grace or automatic retries.
                  type: boolean
                notes:
                  description: Memo printed on every renewal invoice generated for this subscription.
                  type: string
                  maxLength: 5000
                taxIds:
                  description: Host tax-ID snapshot. Forwarded onto each renewal invoice unchanged.
                  maxItems: 20
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        maxLength: 50
                      value:
                        type: string
                        maxLength: 100
                    required:
                      - type
                      - value
                autoCharge:
                  description: >-
                    Defaults to true. When false, the scheduler stops at finalize and the customer pays each renewal
                    invoice via the emailed payment link.
                  type: boolean
                paymentDueDays:
                  description: >-
                    Days the customer has to pay each renewal invoice when autoCharge=false. Each renewal's dueAt =
                    renewalDate + paymentDueDays.
                  type: integer
                  minimum: 0
                  maximum: 9007199254740991
                taxRate:
                  description: >-
                    Single tax rate (percent) applied to every renewal invoice subtotal. Persisted on the sub; the
                    scheduler applies it on each renewal.
                  type: number
                  minimum: 0
                  maximum: 100
                metadata:
                  type: object
                  additionalProperties:
                    type: string
