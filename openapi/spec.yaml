    patch:
      summary: Update Contact
      tags:
        - Contacts
      description: Updates a contact. Optionally merges another contact into the target when `mergeWith` is set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contact:
                  type: object
                  properties:
                    firstName:
                      type: string
                    lastName:
                      type: string
                    email:
                      type: string
                      format: email
                      pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                    phone:
                      anyOf:
                        - type: string
                        - nullable: true
                          enum:
                            - null
                    status:
                      type: string
                      enum:
                        - deleted
                        - imported
                        - unsubscribed
                        - opted-in
                        - unknown
                      description: |-
                        Contact lifecycle status.
                        - opted-in / unsubscribed: explicit consent state
                        - unknown: never recorded a choice
                        - imported / deleted: lifecycle states from list imports / soft-deletes
                  required:
                    - firstName
                    - lastName
                    - email
                    - status
                  description: New contact field values
                mergeWith:
                  description: |-
                    Id of a second contact to absorb into the target during this update.
                    Set when an email change collides with another existing contact.
                  type: string
                resolution:
                  description: |-
                    Required when `mergeWith` is set; chooses how field-level
                    conflicts resolve.
                  type: string
                  enum:
                    - safe-merge
                    - overwrite-merge
              required:
                - contact
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: Contact id, discoverable via list_contacts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                      email:
                        type: string
                      vendorId:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                      fullName:
                        type: string
                      phone:
                        anyOf:
                          - type: string
                          - nullable: true
                            enum:
                              - null
                      status:
                        type: string
                        enum:
                          - deleted
                          - imported
                          - unsubscribed
                          - opted-in
                          - unknown
                        description: |-
                          Contact lifecycle status.
                          - opted-in / unsubscribed: explicit consent state
                          - unknown: never recorded a choice
                          - imported / deleted: lifecycle states from list imports / soft-deletes
                      grossSum:
                        type: number
                      orderSum:
                        type: number
                      leastRecentOrder:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
