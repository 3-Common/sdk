  /v1/forms/{formId}/duplicate:
    post:
      summary: Duplicate Form
      tags:
        - Forms
      description: |-
        Create a copy of an existing form, including all of its elements, layout,
        and conditional logic. By default, the copy's name is prefixed with "[Copy]"
        and its status is set to "draft". Both can be overridden.
        Returns the full duplicated form document.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  description: |2-

                        If specified, the duplicated form will have the given name. Otherwise, a
                        default name will be generated by prefixing the existing name with "[Copy]".
                      
                  type: string
                status:
                  description: |-
                    If specified, the new form will have the given status.
                    Otherwise, the new form will be a draft by default.
                  type: string
                  enum:
                    - draft
                    - active
                    - archived
      parameters:
        - schema:
            type: string
          in: path
          name: formId
          required: true
          description: The ID of the form.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - type: object
                        properties:
                          id:
                            type: string
                            description: The form's ID.
                          name:
                            type: string
                            description: The form's display name.
                          nameHidden:
                            description: If true, the name of the form will not be shown to respondents.
                            type: boolean
                          ownerId:
                            type: string
                            description: The ID of the host who owns this form.
                          status:
                            type: string
                            enum:
                              - draft
                              - active
                              - archived
                            description: >-
                              Determines the status of the form.

                              - draft: the form cannot be accessed directly at its URL, and may not show up to the
                              organizer in tables by default

                              - active: the form can be accessed by its URL, and appears to the organizer in all tables

                              - archived: for all intents and purposes, the form is deleted, but can still be accessed
                              and restored in the forms dashboard
                          rows:
                            type: array
                            items:
                              type: object
                              properties:
                                columns:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      elementIndex:
                                        type: number
                                        description: |-
                                          The index of the element in the form's `elements` array which is
                                          displayed in this column.
                                      widthFraction:
                                        type: number
                                        description: |-
                                          A value between 0 and 1 that determines the width of this column in the row.
                                          The sum of all `widthFraction` values in a row always sums to 1.
                                    required:
                                      - elementIndex
                                      - widthFraction
                                    additionalProperties: false
                                  description: |-
                                    Determines which elements are displayed in the row, and how much of the
                                    row's total width each element occupies.
                              required:
                                - columns
                              additionalProperties: false
                            description: |-
                              A form's layout consists of rows, each with one or more columns. Each column
                              contains a single form element. Form layouts determine the order that the
                              form's elements are displayed in, not the order of the form's `elements`
                              array.
                          submitButtonText:
                            type: string
                            description: Text displayed in the form's submission button. Typically, "Submit" is the default.
                          submitButtonWidth:
                            type: string
                            enum:
                              - auto
                              - fill
                            description: >-
                              Whether the form's submission button should shrink to fit its label ("auto"), or fill its
                              container ("fill").
                          submitButtonAlign:
                            description: >-
                              If `submitButtonWidth` is "auto", this determines how the submission button is
                              horizontally aligned.
                            type: string
                            enum:
                              - left
                              - center
                          type:
                            type: string
                            enum:
                              - standalone
                          elements:
                            type: array
                            items:
                              oneOf:
                                - type: object
                                  properties:
                                    id:
                                      description: >-
                                        The unique ID of this element. Present on existing elements returned from the
                                        backend, omitted when creating new ones.
                                      type: string
                                    prompt:
                                      type: string
                                      description: >-
                                        For question elements, the question text; for static elements, a label shown
                                        above the element.
                                    promptHidden:
                                      description: If true, the element's prompt will not be shown to respondents.
                                      type: boolean
                                    helperText:
                                      description: Optional subtle helper text to display below the element.
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                        - Text
                                    required:
                                      type: boolean
                                      description: If true, the respondent must answer this question to submit the form.
                                    propertyId:
                                      description: |-
                                        ID of a CRM property that will be set by the answer to this question.
                                        The CRM property's data type must align with the question's type.
                                        For standalone forms, only Contact properties can be used.
                                        For order forms, Ticket properties can be used for ticket-holder questions,
                                        Order properties can be used for buyer-only questions, and Contact properties
                                        can be used in either section.
                                      type: string
                                    propertyData:
                                      description: >-
