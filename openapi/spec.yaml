  /v1/forms/{formId}/elements/{elementId}/logic-rules:
    post:
      summary: Add Logic Rule
      tags:
        - Forms
      description: |-
        Add a conditional logic rule to an element. When the source element's
        answer matches the condition, the target element is revealed. The source
        element must be a selection type (Select One, Select Multiple, or their
        "Other" variants) or a Yes/No question.
        For order forms, attendee-section elements cannot reveal buyer-section
        elements.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                revealedElementId:
                  type: string
                  description: The target element to show when the condition is met.
                condition:
                  anyOf:
                    - type: object
                      properties:
                        optionIndices:
                          type: array
                          items:
                            type: number
                          description: |-
                            The indices of the options in the question's `options` array, or its
                            custom property's options. The way these options are used depends on the
                            `operator` property.
                            An index of -1 specifies the "Other" option, for applicable question types.
                        operator:
                          type: string
                          enum:
                            - all_of
                            - any_of
                            - none_of
                          description: The operator applied to the options specified by the `optionIndices` property
                      required:
                        - optionIndices
                        - operator
                      description: |-
                        For selection questions. Reveals the target element when the selected
                        options satisfy the operator.
                    - type: object
                      properties:
                        selectionType:
                          type: string
                          enum:
                            - is
                            - is_not
                          description: |-
                            Determines whether the question's value must be strictly equal to the logic
                            group's `value` property, or not strictly equal to it. Note that
                            `undefined` (no answer) is treated differently from an explicit `false`
                            answer.
                        value:
                          type: boolean
                          description: |-
                            Determines the value which is compared to the form answer's value for this
                            logic group (the type of comparison depends on the `selectionType` property).
                      required:
                        - selectionType
                        - value
                      description: For Yes/No questions. Reveals the target element based on the answer value.
              required:
                - revealedElementId
                - condition
      parameters:
        - schema:
            type: string
          in: path
          name: formId
          required: true
          description: The ID of the form.
        - schema:
            type: string
          in: path
          name: elementId
          required: true
          description: The ID of the element.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    anyOf:
                      - oneOf:
                          - type: object
                            properties:
                              id:
                                description: >-
                                  The unique ID of this element. Present on existing elements returned from the backend,
                                  omitted when creating new ones.
                                type: string
                              prompt:
                                type: string
                                description: >-
                                  For question elements, the question text; for static elements, a label shown above the
                                  element.
