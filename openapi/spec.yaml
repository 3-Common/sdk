                required:
                  - error
                additionalProperties: false
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '403':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '404':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '409':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
  /v1/invoices/{id}/payments:
    post:
      summary: Mark Invoice Paid
      tags:
        - Invoices
      description: >-
        Records a manual payment against an open invoice. Cumulative payments meeting the total transition the invoice
        to paid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                payment:
                  type: integer
                  minimum: 1
                  maximum: 9007199254740991
                  description: Payment amount in the invoice currency, minor units
                idempotencyKey:
                  description: Caller-supplied dedupe key. Replaying the same key for the same invoice is a no-op.
                  type: string
                note:
                  description: Free-form note recorded on the payment (e.g. payment method)
                  type: string
              required:
                - payment
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: Invoice id, discoverable via list_invoices
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      hostId:
                        type: string
                      customerId:
                        type: string
                        description: CRM contact id of the recipient
                      customerEmail:
                        description: Snapshot of the recipient's email captured at create time
                        type: string
                      customerFirstName:
                        description: Snapshot of the recipient's first name captured at create time
                        type: string
                      customerLastName:
                        description: Snapshot of the recipient's last name captured at create time
                        type: string
                      customerPhone:
                        description: Snapshot of the recipient's phone captured at create time
                        type: string
                      number:
                        anyOf:
                          - type: string
                          - nullable: true
                            enum:
                              - null
                        description: Sequential invoice number; null while in draft
                      currency:
                        type: string
                        enum:
                          - USD
                          - CAD
                      lineItems:
                        type: array
                        items:
                          type: object
                          properties:
                            description:
                              type: string
                              description: Human-readable description shown on the invoice
                            quantity:
                              type: integer
                              minimum: 1
                              maximum: 9007199254740991
                              description: Whole units billed
                            unitAmount:
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                              description: Per-unit price in the invoice currency, minor units (cents for USD)
                            productId:
                              description: Optional reference to a Product in the catalog
                              type: string
                            priceId:
                              description: Optional reference to the Price doc that backed this line (subscription billing)
                              type: string
                            eventId:
                              description: Optional reference to an Event when the underlying product was event-attached
                              type: string
                            taxAmount:
                              description: Optional tax for this line, minor units
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                            productType:
                              description: Snapshot of the product type at line-creation time; drives post-payment fulfillment
                              type: string
                              enum:
                                - product
                                - add-on
                                - bundle
                                - donation
                                - event-ticket
                            productName:
                              description: Snapshot of the product display name at line-creation time
                              type: string
                            components:
                              description: |-
                                Snapshot of the bundle's components, flat-expanded by qty. Set
                                only when `productType === "bundle"`. Carries each component's
                                product id + display name + image URL + (when applicable) event
                                + seating snapshot so the fulfillment pipeline can issue
                                information-equivalent component tickets and the tickets PDF
                                can render the legacy "ticket"-style block per item.
                              type: array
                              items:
                                type: object
                                properties:
                                  productId:
                                    type: string
                                  productName:
                                    type: string
                                  productType:
                                    description: >-
                                      Catalog product type for the component — drives sort + visual treatment in the
                                      rendered bundle items list.
                                    type: string
                                    enum:
                                      - product
                                      - add-on
                                      - bundle
                                      - donation
                                      - event-ticket
                                  productImageUrl:
                                    type: string
                                  eventId:
                                    description: >-
                                      Per-component parent event id — snapshotted onto the issued component ticket as
                                      legacy `event_id` so b2c availability and seat-occupation queries see the sale.
                                    type: string
                                  eventImageUrl:
