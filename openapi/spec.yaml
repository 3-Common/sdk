  /v1/forms/:
    get:
      summary: List Forms
      tags:
        - Forms
      description: |-
        Fetch a list of forms belonging to the user. Each entry contains basic
        information about the form such as ID, name, and status.
        The returned results are paginated.
      parameters:
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: page
          required: false
        - schema:
            default: 50
            type: integer
            minimum: 1
            maximum: 250
          in: query
          name: pageSize
          required: false
        - schema:
            type: string
            enum:
              - standalone
              - order
          in: query
          name: type
          required: false
          description: |-
            If specified, only forms of the given type are fetched.
            Otherwise, all forms are fetched.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasMore:
                    type: boolean
                    description: If true, there are more pages of results available.
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: The form's ID.
                        name:
                          type: string
                          description: The form's display name.
                        numElements:
                          type: number
                          description: The number of questions and static elements in the form.
                        type:
                          type: string
                          enum:
                            - standalone
                            - order
                          description: >-
                            The type of form, determines whether the form is used for event checkout flows ("order") or
                            as a standalone form ("standalone").
                        status:
                          type: string
                          enum:
                            - draft
                            - active
                            - archived
                          description: >-
                            Determines the status of the form.

                            - draft: the form cannot be accessed directly at its URL, and may not show up to the
                            organizer in tables by default

                            - active: the form can be accessed by its URL, and appears to the organizer in all tables

                            - archived: for all intents and purposes, the form is deleted, but can still be accessed and
                            restored in the forms dashboard
                      required:
                        - id
                        - name
                        - numElements
                        - type
                        - status
                      additionalProperties: false
                      description: A compact summary of a form.
                required:
                  - hasMore
                  - data
                additionalProperties: false
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '403':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
