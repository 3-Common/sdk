  /v1/invoices/:
    get:
      summary: List Invoices
      tags:
        - Invoices
      description: >-
        Lists the host's invoices, optionally filtered by status, recipient, or issue date. Sorted by issuedAt
        descending. Paginated.
      parameters:
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: page
          required: false
          description: Page number (0-based, default 0)
        - schema:
            default: 20
            type: integer
            minimum: 1
            maximum: 100
          in: query
          name: pageSize
          required: false
          description: Items per page (default 20, max 100)
        - schema:
            type: string
            enum:
              - draft
              - open
              - paid
              - void
          in: query
          name: status
          required: false
          description: Filter by status; omit to include all
        - schema:
            type: string
          in: query
          name: customerId
          required: false
          description: Filter by recipient contact id
        - schema:
            type: string
            format: date-time
            pattern: >-
              ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
          in: query
          name: issuedAfter
          required: false
          description: Only invoices issued on or after this date (ISO 8601)
        - schema:
            type: string
            format: date-time
            pattern: >-
              ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
          in: query
          name: issuedBefore
          required: false
          description: Only invoices issued on or before this date (ISO 8601)
        - schema:
            type: string
          in: query
          name: fields
          required: false
          description: >-
            Comma-separated list of fields to return. Valid: id, hostId, customerId, number, currency, subtotal,
            taxTotal, total, amountPaid, amountDue, status, issuedAt, dueAt, paidAt, voidedAt, subscriptionId, quoteId,
            createdAt, updatedAt. Omit for all fields.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        hostId:
                          type: string
                        customerId:
                          type: string
                          description: CRM contact id of the recipient
                        number:
                          anyOf:
                            - type: string
                            - nullable: true
                              enum:
                                - null
                          description: Sequential invoice number; null while in draft
                        currency:
                          type: string
                          enum:
                            - USD
                            - CAD
                        lineItems:
                          type: array
                          items:
                            type: object
                            properties:
                              description:
                                type: string
                                description: Human-readable description shown on the invoice
                              quantity:
                                type: integer
                                minimum: 1
                                maximum: 9007199254740991
                                description: Whole units billed
                              unitAmount:
                                type: integer
                                minimum: 0
                                maximum: 9007199254740991
                                description: Per-unit price in the invoice currency, minor units (cents for USD)
                              productId:
                                description: Optional reference to a Product in the catalog
                                type: string
                              taxAmount:
                                description: Optional tax for this line, minor units
                                type: integer
                                minimum: 0
                                maximum: 9007199254740991
                            required:
                              - description
                              - quantity
                              - unitAmount
                            additionalProperties: false
                        payments:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              amount:
                                type: integer
                                minimum: 0
                                maximum: 9007199254740991
                                description: Amount applied, minor units
                              paidAt:
                                type: string
                                format: date-time
                                pattern: >-
                                  ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                              idempotencyKey:
                                description: Caller-supplied dedupe key, if one was provided
                                type: string
                              note:
                                description: Free-form note (payment method, upstream provider id, etc.)
                                type: string
                            required:
                              - id
                              - amount
                              - paidAt
                            additionalProperties: false
                          description: Audit log of every payment applied to this invoice
                        subtotal:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: Sum of (qty * unitAmount), minor units
                        taxTotal:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: Sum of line taxAmount, minor units
                        total:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: subtotal + taxTotal, minor units
                        amountPaid:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: Sum of payments received, minor units
                        amountDue:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: total - amountPaid, clamped to >= 0
                        status:
                          type: string
                          enum:
                            - draft
                            - open
                            - paid
                            - void
                          description: |-
                            Invoice lifecycle status.
                            - draft: not yet issued; freely editable
                            - open: finalized and issued; awaiting payment
                            - paid: fully paid
                            - void: cancelled before payment
                        notes:
                          type: string
                        issuedAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        dueAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        paidAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        voidedAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        subscriptionId:
                          description: Set when generated by a billing Subscription
                          type: string
                        quoteId:
                          description: Set when accepted from a Quote
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        updatedAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      additionalProperties: false
                  hasMore:
