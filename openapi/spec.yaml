    patch:
      summary: Edit Form Settings
      tags:
        - Forms
      description: |-
        Update form-level settings such as name, status, and submit button
        properties. Only the fields provided will be overwritten; omitted fields
        are left unchanged. The `isEventForm` flag cannot be modified after
        creation. To modify elements or layout, use the element-specific tools.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The form's display name.
                nameHidden:
                  anyOf:
                    - description: If true, the name of the form will not be shown to respondents.
                      type: boolean
                    - nullable: true
                      enum:
                        - null
                status:
                  type: string
                  enum:
                    - draft
                    - active
                    - archived
                  description: >-
                    Determines the status of the form.

                    - draft: the form cannot be accessed directly at its URL, and may not show up to the organizer in
                    tables by default

                    - active: the form can be accessed by its URL, and appears to the organizer in all tables

                    - archived: for all intents and purposes, the form is deleted, but can still be accessed and
                    restored in the forms dashboard
                submitButtonText:
                  type: string
                  description: Text displayed in the form's submission button. Typically, "Submit" is the default.
                submitButtonWidth:
                  type: string
                  enum:
                    - auto
                    - fill
                  description: >-
                    Whether the form's submission button should shrink to fit its label ("auto"), or fill its container
                    ("fill").
                submitButtonAlign:
                  anyOf:
                    - description: >-
                        If `submitButtonWidth` is "auto", this determines how the submission button is horizontally
                        aligned.
                      type: string
                      enum:
                        - left
                        - center
                    - nullable: true
                      enum:
                        - null
              description: |-
                Subset of form fields which can be edited after creation. Excludes `type`
                (immutable after creation), as well as elements and layout (which are managed
                by other tools).
                Setting a field to null will remove it from the form, omitting a field will
                leave it unchanged.
        description: |-
          Subset of form fields which can be edited after creation. Excludes `type`
          (immutable after creation), as well as elements and layout (which are managed
          by other tools).
          Setting a field to null will remove it from the form, omitting a field will
          leave it unchanged.
      parameters:
        - schema:
            type: string
          in: path
          name: formId
          required: true
          description: The ID of the form.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - type: object
                        properties:
                          id:
                            type: string
                            description: The form's ID.
                          name:
                            type: string
                            description: The form's display name.
                          nameHidden:
                            description: If true, the name of the form will not be shown to respondents.
                            type: boolean
                          ownerId:
                            type: string
                            description: The ID of the host who owns this form.
                          status:
                            type: string
                            enum:
                              - draft
                              - active
                              - archived
                            description: >-
                              Determines the status of the form.

                              - draft: the form cannot be accessed directly at its URL, and may not show up to the
                              organizer in tables by default

                              - active: the form can be accessed by its URL, and appears to the organizer in all tables

                              - archived: for all intents and purposes, the form is deleted, but can still be accessed
                              and restored in the forms dashboard
                          rows:
                            type: array
                            items:
                              type: object
                              properties:
                                columns:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      elementIndex:
                                        type: number
                                        description: |-
                                          The index of the element in the form's `elements` array which is
                                          displayed in this column.
                                      widthFraction:
