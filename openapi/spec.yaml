  /v1/subscriptions/{id}/upcoming:
    get:
      summary: Preview Upcoming Subscription Invoice
      tags:
        - Subscriptions
      description: >-
        Returns a non-persisted preview of the invoice the next renewal will generate (Stripe-style invoice.upcoming).
        Returns `invoice: null` when the subscription is set to cancel at period end. Rejects incomplete, canceled, and
        unpaid subscriptions (no future cycle exists to preview). For past_due subscriptions, the preview reflects the
        cycle AFTER the current retry, not the in-flight unpaid invoice itself. To inspect the current cycle's open
        invoice, use `list_invoices` with `subscriptionId` and `status: payment_failed`.
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: Subscription id, discoverable via list_subscriptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      invoice:
                        anyOf:
                          - type: object
                            properties:
                              customerId:
                                type: string
                              subscriptionId:
                                type: string
                              currency:
                                type: string
                              lineItems:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    description:
                                      type: string
                                    quantity:
                                      type: integer
                                      minimum: 1
                                      maximum: 9007199254740991
                                    unitAmount:
                                      type: integer
                                      minimum: 0
                                      maximum: 9007199254740991
                                      description: Per-unit amount in minor units (cents)
                                    productId:
                                      type: string
                                    priceId:
                                      type: string
                                  required:
                                    - description
                                    - quantity
                                    - unitAmount
                                  additionalProperties: false
                                  description: 'Slim line-item shape: only the fields a preview needs'
                              subtotal:
                                type: integer
                                minimum: 0
                                maximum: 9007199254740991
                                description: Sum of line-item amounts in minor units
                              total:
                                type: integer
                                minimum: 0
                                maximum: 9007199254740991
                                description: Final amount the next renewal will bill, in minor units
                              periodStart:
                                type: string
                                format: date-time
                                pattern: >-
                                  ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                              periodEnd:
                                type: string
                                format: date-time
                                pattern: >-
                                  ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                            required:
                              - customerId
                              - subscriptionId
                              - currency
                              - lineItems
                              - subtotal
                              - total
                              - periodStart
                              - periodEnd
                            additionalProperties: false
