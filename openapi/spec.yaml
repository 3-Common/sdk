  /v1/events/:
    get:
      summary: List Events
      tags:
        - Events
      description: >-
        Lists the organizer's events, optionally filtered by status or searched by name/address. Sorted by start date
        descending. Paginated.
      parameters:
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: page
          required: false
          description: Page number (0-based, default 0)
        - schema:
            default: 20
            type: integer
            minimum: 1
            maximum: 100
          in: query
          name: pageSize
          required: false
          description: Items per page (default 20, max 100)
        - schema:
            type: string
            enum:
              - draft
              - open
              - closed
              - unpublished
              - cancelled
              - postponed
              - schedule
          in: query
          name: status
          required: false
          description: Filter by status; omit to include all
        - schema:
            type: string
          in: query
          name: search
          required: false
          description: Search events by name or address (case-insensitive partial match)
        - schema:
            type: string
            format: date-time
            pattern: >-
              ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
          in: query
          name: startBefore
          required: false
          description: 'Only events starting on or before this date (ISO 8601). Example: 2025-06-01T00:00:00.000Z'
        - schema:
            type: string
            format: date-time
            pattern: >-
              ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
          in: query
          name: startAfter
          required: false
          description: 'Only events starting on or after this date (ISO 8601). Example: 2025-01-01T00:00:00.000Z'
        - schema:
            type: string
          in: query
          name: sortField
          required: false
          description: 'Field to sort by (default: start)'
        - schema:
            type: string
            enum:
              - asc
              - desc
          in: query
          name: sortDirection
          required: false
          description: 'Sort direction (default: desc)'
        - schema:
            type: string
          in: query
          name: filters
          required: false
          description: >-
            JSON-encoded array of filter groups for advanced filtering.

            Each group has "logic" ("and" | "or") and "conditions" (array of conditions or nested groups).

            Each condition has "field", "operator", and optional "value".

            Operators by type:

            - Text: is_equal_to_any_of, is_not_equal_to_any_of, contains, contains_exactly

            - Date: is_before, is_after, is_between (value: {start, end})

            - Number: is_equal_to, is_not_equal_to, is_greater_than, is_greater_than_or_equal_to, is_less_than,
            is_less_than_or_equal_to, is_between

            - Select: is_any_of, is_none_of

            - Common: is_empty, is_not_empty

            Example:
            [{"logic":"and","conditions":[{"field":"status","operator":"is_any_of","value":["open","closed"]},{"field":"ticketSum","operator":"is_greater_than","value":10}]}]
        - schema:
            type: string
          in: query
          name: fields
          required: false
          description: >-
            Comma-separated list of fields to return. Valid: id, name, type, schedule, start, end, multiDayStartTimes,
            multiDayEndTimes, status, itemsSold, revenueCents, minPriceCents, maxPriceCents, currency, timeZone,
            isPublic, isVirtual, location, locationPlaceholder, virtualEventLink, venueName, image, images, tags,
            customTags, isCancelled, createdAt, updatedAt. Omit for all fields.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        type:
                          type: string
                          description: '''event'', ''booking'', ''recurring'', or ''multiple'''
                        description:
                          description: Event description as HTML. Only present when descriptionBlocks is empty.
                          type: string
                        descriptionBlocks:
                          description: >-
                            Rich content blocks for the event description. If present and non-empty, clients should
                            render these instead of the description field.

                            Each block has a type (text: HTML content, image: URL, video: YouTube URL) and content
                            string.
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                                enum:
                                  - text
                                  - image
                                  - video
                              content:
                                type: string
                              id:
                                type: number
                            required:
                              - type
                              - content
                              - id
                            additionalProperties: false
                        schedule:
                          type: string
                          enum:
                            - Single date
                            - Multiple dates
                        start:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                          description: For single-date events the start time; for multi-date the first time slot.
                        end:
                          description: For single-date events the end time; for multi-date the last time slot.
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        multiDayStartTimes:
                          description: All start times for multi-day events
                          type: array
                          items:
                            type: string
                        multiDayEndTimes:
                          description: All end times for multi-day events
                          type: array
                          items:
                            type: string
                        status:
                          type: string
                          enum:
                            - draft
                            - open
                            - closed
                            - unpublished
                            - cancelled
                            - postponed
                            - schedule
                          description: |-
                            The status of an event.
                            - draft: has not been published
                            - open: published and ticket sales are open
                            - closed: published, ticket sales are closed but the event will proceed as normal
                            - unpublished: was previously published, but is no longer visible
                            - cancelled: published, ticket sales closed, event is cancelled
                            - postponed: published, ticket sales closed, event is postponed
                            - schedule: not yet published, scheduled to be published in the future
                        itemsSold:
                          type: number
                          description: Total tickets and products sold
                        revenueCents:
                          type: number
                          description: Total event revenue, in cents
                        minPriceCents:
                          anyOf:
                            - type: number
                            - nullable: true
                              enum:
                                - null
                          description: Minimum ticket/product price in cents. Does not contain fees.
                        maxPriceCents:
                          anyOf:
                            - type: number
                            - nullable: true
                              enum:
                                - null
                          description: Maximum ticket/product price in cents. Does not contain fees.
                        currency:
                          type: string
                          description: Currency code (e.g. USD, CAD)
                        timeZone:
                          description: IANA time zone (may be missing for pre-2024 events)
                          type: string
                        isPublic:
                          type: boolean
                          description: True if the event is public
                        isVirtual:
                          type: boolean
                          description: True if the event is virtual
                        location:
                          description: Event location with address and coordinates
                          type: object
                          properties:
                            address:
                              type: string
                            lat:
                              type: number
                            lng:
                              type: number
                          additionalProperties: false
                        locationPlaceholder:
                          description: Placeholder text to link to location
                          type: string
                        virtualEventLink:
                          description: Link for virtual access
                          type: string
                        venueName:
                          description: Name of the associated seating-chart venue
                          type: string
                        image:
                          description: URL of the event's main image
                          type: string
                        images:
                          description: Gallery images
                          type: array
                          items:
                            type: string
                        tags:
                          description: Tag metadata
                          type: array
                          items:
                            type: string
                        customTags:
                          description: Custom tag overlays
