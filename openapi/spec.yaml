    delete:
      summary: Toggle "Other" Option (disable)
      tags:
        - Forms
      description: |-
        Enable or disable the freeform "Other" option on a selection question.
        This is the only operation that changes an element's type:
        - 'Select One' <-> 'Select One or "Other"'
        - 'Select Multiple' <-> 'Select Multiple with "Other"'
