  /v1/forms/{formId}/elements/{elementId}/other-option:
    put:
      summary: Toggle "Other" Option (enable)
      tags:
        - Forms
      description: |-
        Enable or disable the freeform "Other" option on a selection question.
        This is the only operation that changes an element's type:
        - 'Select One' <-> 'Select One or "Other"'
        - 'Select Multiple' <-> 'Select Multiple with "Other"'
        When enabling, an `otherPrompt` label must be provided. When disabling,
        the existing `otherPrompt` is removed. Fails if the specified element is
        not a selection question.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                otherPrompt:
                  type: string
                  description: The label for the "Other" option.
              required:
                - otherPrompt
