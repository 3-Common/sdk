openapi: 3.0.3
info:
  title: 3Common API
  description: Public REST API for the 3Common event management platform.
  version: 0.0.1
  contact:
    name: 3Common Support
    url: https://help.3common.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API key as Bearer token
  schemas: {}
paths:
  /health/:
    get:
      summary: Health check
      tags:
        - System
      description: Returns the server status, API version, and database connection state. No authentication required.
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                      - degraded
                  version:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                    pattern: >-
                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  db:
                    type: string
                    enum:
                      - connected
                      - disconnected
                required:
                  - status
                  - version
                  - timestamp
                  - db
                additionalProperties: false
  /v1/:
    get:
      summary: API info
      tags:
        - System
      description: Returns basic information about the API. Requires a valid API key.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  api:
                    type: string
                  version:
                    type: string
                  docs:
                    type: string
                    description: URL to the interactive API documentation
                required:
                  - api
                  - version
                  - docs
                additionalProperties: false
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
                description: Missing or invalid API key
  /v1/contacts/:
    get:
      summary: List Contacts
      tags:
        - Contacts
      description: Lists the host's contacts, sorted and filtered. Paginated.
      parameters:
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: pageNumber
          required: false
          description: Page number (0-based)
        - schema:
            default: 20
            type: integer
            minimum: 1
            maximum: 500
          in: query
          name: pageSize
          required: false
          description: Items per page (default 20, max 500)
        - schema:
            anyOf:
              - type: string
                enum:
                  - mostRecentOrder
                  - leastRecentOrder
                  - orderSum
                  - grossSum
                  - email
                  - firstName
                  - lastName
                  - fullName
                  - phone
                  - status
                  - createdAt
                  - updatedAt
                  - events_attended
                  - items_purchased
                  - products_purchased
              - type: string
                pattern: ^[0-9a-fA-F]{24}$
          in: query
          name: sortField
          required: false
          description: |-
            Field to sort by. Index-backed (fast) values: `mostRecentOrder`,
            `orderSum`, `grossSum`. Other enum values + 24-char hex custom-
            property ids are accepted and sorted in-memory by the database —
            fine at per-page volumes but avoid on large hosts. Defaults to
            `mostRecentOrder` desc.
        - schema:
            type: string
            enum:
              - asc
              - desc
          in: query
          name: sortDirection
          required: false
          description: Sort direction. Defaults to desc when sortField is provided.
        - schema:
            type: string
            enum:
              - all
              - opted-in
              - unknown
              - unsubscribed
              - imported
          in: query
          name: filter
          required: false
          description: Quick status filter; case-insensitive. "all" or omit for no filter. ANDed with `filters` when both supplied.
        - schema:
            type: string
          in: query
          name: filters
          required: false
          description: >-
            JSON-encoded array of filter groups for advanced filtering.

            Each group has "logic" ("and" | "or") and "conditions" (array of conditions or nested groups).

            Each condition has "field", "operator", and optional "value".

            Operators by type:

            - Text: is_equal_to_any_of, is_not_equal_to_any_of, contains, contains_exactly

            - Date: is_before, is_after, is_between (value: {start, end})

            - Number: is_equal_to, is_not_equal_to, is_greater_than, is_greater_than_or_equal_to, is_less_than,
            is_less_than_or_equal_to, is_between

            - Select: is_any_of, is_none_of

            - Common: is_empty, is_not_empty

            Conditions referencing fields outside the persisted contact schema are silently ignored.

            Example:
            [{"logic":"and","conditions":[{"field":"status","operator":"is_any_of","value":["opted-in"]},{"field":"grossSum","operator":"is_greater_than","value":1000}]}]
        - schema:
            type: string
          in: query
          name: search
          required: false
          description: Free-text search over email, firstName, lastName, fullName
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        firstName:
                          type: string
                        lastName:
                          type: string
                        fullName:
                          type: string
                        email:
                          type: string
                        phone:
                          type: string
                        vendorId:
                          type: string
                        orderSum:
                          type: number
                        grossSum:
                          type: number
                        firstOrder:
                          description: First order, ms since epoch
                          type: number
                        lastOrder:
                          description: Most recent order, ms since epoch
                          type: number
                        createdAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        status:
                          type: string
                          enum:
                            - unsubscribed
                            - opted-in
                            - unknown
                          description: Subset of statuses surfaced on the compact contact projection.
                        eventsAttended_IDS:
                          type: array
                          items:
                            type: string
                        itemsPurchased_IDS:
                          type: array
                          items:
                            type: string
                        productsPurchased_IDS:
                          type: array
                          items:
                            type: string
                      required:
                        - id
                        - firstName
                        - lastName
                        - fullName
                        - email
                        - vendorId
                        - orderSum
                        - grossSum
                        - status
                        - eventsAttended_IDS
                        - itemsPurchased_IDS
                        - productsPurchased_IDS
                      additionalProperties: {}
                  hasMore:
                    type: boolean
                  pageNumber:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  pageSize:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                required:
                  - data
                  - hasMore
                  - pageNumber
                  - pageSize
                additionalProperties: false
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '403':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
    post:
      summary: Create Contact
      tags:
        - Contacts
      description: |-
        Creates a new contact. Fails with 409 if a contact with the same
        email already exists for the host — callers wanting "create or
        fetch existing" behaviour should use the host management site upsert flow instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                  description: Contact email — unique per host, lowercased on persist
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
              required:
                - email
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                      fullName:
                        type: string
                      email:
                        type: string
                      phone:
                        type: string
                      vendorId:
                        type: string
                      orderSum:
                        type: number
                      grossSum:
                        type: number
                      firstOrder:
                        description: First order, ms since epoch
                        type: number
                      lastOrder:
                        description: Most recent order, ms since epoch
                        type: number
                      createdAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      status:
                        type: string
                        enum:
                          - unsubscribed
                          - opted-in
                          - unknown
                        description: Subset of statuses surfaced on the compact contact projection.
                      eventsAttended_IDS:
                        type: array
                        items:
                          type: string
                      itemsPurchased_IDS:
                        type: array
                        items:
                          type: string
                      productsPurchased_IDS:
                        type: array
                        items:
                          type: string
                    required:
                      - id
                      - firstName
                      - lastName
                      - fullName
                      - email
                      - vendorId
                      - orderSum
                      - grossSum
                      - status
                      - eventsAttended_IDS
                      - itemsPurchased_IDS
                      - productsPurchased_IDS
                    additionalProperties: {}
                required:
                  - data
                additionalProperties: false
        '400':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details: {}
                    required:
                      - code
                      - message
                    additionalProperties: false
                required:
                  - error
                additionalProperties: false
        '403':
          description: Default Response
