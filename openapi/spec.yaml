  /v1/subscriptions/{id}/bill:
    post:
      summary: Bill Subscription Current Period
      tags:
        - Subscriptions
      description: >-
        Generates a draft invoice for a subscription's current period without advancing the period. Used for the
        first-period invoice on a non-trial subscription, or one-off rebilling.
