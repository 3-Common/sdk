    get:
      summary: List Subscriptions
      tags:
        - Subscriptions
      description: >-
        Lists the host's subscriptions. Filterable by status, contact, or Price. Sorted by creation date desc.
        Paginated.
      parameters:
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: page
          required: false
          description: Page number (0-based)
        - schema:
            default: 20
            type: integer
            minimum: 1
            maximum: 100
          in: query
          name: pageSize
          required: false
          description: Items per page (default 20, max 100)
        - schema:
            type: string
            enum:
              - incomplete
              - trialing
              - active
              - past_due
              - canceled
              - unpaid
          in: query
          name: status
          required: false
          description: Filter by status
        - schema:
            type: string
          in: query
          name: contactId
          required: false
          description: Filter by recipient contact id
        - schema:
            type: string
          in: query
          name: priceId
          required: false
          description: Filter by Price reference
        - schema:
            type: string
          in: query
          name: fields
          required: false
          description: >-
            Comma-separated list of fields to return. Valid: id, hostId, contactId, customerEmail, priceId, quantity,
            status, currentPeriodStart, currentPeriodEnd, trialEnd, billingCycleAnchor, cancelAt, cancelAtPeriodEnd,
            canceledAt, endedAt, startedAt, dunningEnabled, autoCharge, nextRetryAt, retryCount, createdAt, updatedAt.
            Omit for all.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        hostId:
                          type: string
                        contactId:
                          description: CRM contact id; optional until linked
                          type: string
                        customerEmail:
                          description: Email; allows late-linking to a contact
                          type: string
                        priceId:
                          type: string
                          description: Primary item shortcut — mirrors items[0].priceId
                        quantity:
                          type: integer
                          minimum: 1
                          maximum: 9007199254740991
                          description: Primary item shortcut — mirrors items[0].quantity
                        items:
                          description: >-
                            All billed lines on this subscription. Each item shares the parent sub's billing cycle
                            (Phase 1).
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              priceId:
                                type: string
                              quantity:
                                type: integer
                                minimum: 1
                                maximum: 9007199254740991
                            required:
                              - id
                              - priceId
                              - quantity
                            additionalProperties: false
                        status:
                          type: string
                          enum:
                            - incomplete
                            - trialing
                            - active
                            - past_due
                            - canceled
                            - unpaid
                          description: |-
                            Subscription lifecycle.
                            - incomplete: created, awaiting first payment
                            - trialing: in trial period
                            - active: paying
                            - past_due: renewal payment failed; scheduler is retrying per dunning policy
                            - canceled: terminal — clean cancellation
                            - unpaid: terminal — payment failed (retries exhausted or manual override), access revoked
                        currentPeriodStart:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        currentPeriodEnd:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        trialStart:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        trialEnd:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        billingCycleAnchor:
                          description: Absolute first-billing date; when set, the first paid cycle begins on this date
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        cancelAt:
                          description: Absolute scheduled end date; the sub auto-cancels on renewal once this date passes
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        cancelAtPeriodEnd:
                          type: boolean
                          description: When true, the next renewal will cancel instead of advancing
                        canceledAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        cancelReason:
                          type: string
                        endedAt:
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        startedAt:
                          description: When status first transitioned to active
                          type: string
                          format: date-time
                          pattern: >-
                            ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        dunningEnabled:
                          type: boolean
                          description: When false, failed renewal payments mark the sub unpaid immediately (no retries)
                        firstFailureAt:
