  /v1/subscriptions/{id}/renew:
    post:
      summary: Renew Subscription
      tags:
        - Subscriptions
      description: >-
        Advances a subscription to its next billing period and generates an invoice. If cancelAtPeriodEnd was set,
        transitions to canceled instead. The Phase 4 scheduler will call this on cycle.
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: Subscription id, discoverable via list_subscriptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      hostId:
                        type: string
                      contactId:
                        description: CRM contact id; optional until linked
                        type: string
                      customerEmail:
                        description: Email; allows late-linking to a contact
                        type: string
                      priceId:
                        type: string
                        description: Primary item shortcut — mirrors items[0].priceId
                      quantity:
                        type: integer
                        minimum: 1
                        maximum: 9007199254740991
                        description: Primary item shortcut — mirrors items[0].quantity
                      items:
                        description: >-
                          All billed lines on this subscription. Each item shares the parent sub's billing cycle (Phase
                          1).
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            priceId:
                              type: string
                            quantity:
                              type: integer
                              minimum: 1
                              maximum: 9007199254740991
                          required:
                            - id
                            - priceId
                            - quantity
                          additionalProperties: false
                      status:
                        type: string
                        enum:
                          - incomplete
                          - trialing
                          - active
                          - past_due
                          - canceled
                          - unpaid
                        description: |-
                          Subscription lifecycle.
                          - incomplete: created, awaiting first payment
                          - trialing: in trial period
                          - active: paying
                          - past_due: renewal payment failed; scheduler is retrying per dunning policy
                          - canceled: terminal — clean cancellation
                          - unpaid: terminal — payment failed (retries exhausted or manual override), access revoked
                      currentPeriodStart:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      currentPeriodEnd:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      trialStart:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      trialEnd:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      billingCycleAnchor:
                        description: Absolute first-billing date; when set, the first paid cycle begins on this date
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      cancelAt:
                        description: Absolute scheduled end date; the sub auto-cancels on renewal once this date passes
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      cancelAtPeriodEnd:
                        type: boolean
                        description: When true, the next renewal will cancel instead of advancing
                      canceledAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      cancelReason:
                        type: string
                      endedAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      startedAt:
                        description: When status first transitioned to active
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      dunningEnabled:
                        type: boolean
                        description: When false, failed renewal payments mark the sub unpaid immediately (no retries)
                      firstFailureAt:
                        description: When the renewal payment first failed for the current past-due cycle
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      nextRetryAt:
                        description: When the dunning scheduler will attempt the next retry
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      retryCount:
                        description: Retries attempted on the current past-due cycle
                        type: integer
                        minimum: 0
                        maximum: 9007199254740991
                      notes:
                        description: Memo forwarded onto every renewal invoice
                        type: string
                      taxIds:
                        description: Host tax-ID snapshot rolled forward onto each renewal invoice
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                            value:
                              type: string
                          required:
                            - type
                            - value
                          additionalProperties: false
                      autoCharge:
                        type: boolean
                        description: >-
                          When true (default), the scheduler attempts an off-session charge on renewal. When false,
                          finalize stops at email-payment-link.
                      paymentDueDays:
                        description: Days the customer has to pay each renewal invoice when autoCharge=false.
                        type: integer
                        minimum: 0
                        maximum: 9007199254740991
                      taxRate:
                        description: Single tax rate (percent) applied to every renewal invoice subtotal.
                        type: number
                        minimum: 0
                        maximum: 100
                      metadata:
                        type: object
                        additionalProperties:
                          type: string
                      createdAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      updatedAt:
                        type: string
                        format: date-time
                        pattern: >-
                          ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    additionalProperties: false
                  invoice:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                      total:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                      currency:
                        type: string
                    required:
                      - id
                      - status
                      - total
                      - currency
                    additionalProperties: false
                    description: Slim ref to the invoice generated by the renewal
                required:
                  - data
                additionalProperties: false
        '400':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
