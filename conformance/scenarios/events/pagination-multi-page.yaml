name: auto-paginate walks every page
call:
  resource: events
  method: listAutoPaginate
  args:
    status: open
exchanges:
  - request:
      method: GET
      path: /v1/events
      query:
        status: open
        page: '0'
    response:
      status: 200
      body:
        data:
          - id: evt_1
            name: First
          - id: evt_2
            name: Second
        hasMore: true
  - request:
      method: GET
      path: /v1/events
      query:
        status: open
        page: '1'
    response:
      status: 200
      body:
        data:
          - id: evt_3
            name: Third
        hasMore: false
expectedAutoPaginated:
  - id: evt_1
    name: First
  - id: evt_2
    name: Second
  - id: evt_3
    name: Third
expectedCallCount: 2
