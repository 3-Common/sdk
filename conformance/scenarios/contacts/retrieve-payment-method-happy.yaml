name: retrieve contact payment method — happy path
call:
  resource: contacts
  method: retrievePaymentMethod
  args:
    id: cnt_123
expectedRequest:
  method: GET
  path: /v1/contacts/cnt_123/payment-methods
  headers:
    authorization: 'Bearer 3co_test'
mockResponse:
  status: 200
  headers:
    x-request-id: req-cnt-pm-retrieve-001
  body:
    data:
      id: pm_123
      contactId: cnt_123
      card:
        brand: visa
        last4: '4242'
        expMonth: 12
        expYear: 2030
      status: active
      createdAt: '2026-06-17T12:00:00Z'
      updatedAt: '2026-06-17T12:00:00Z'
expectedResult:
  id: pm_123
  contactId: cnt_123
  status: active
  card:
    brand: visa
    last4: '4242'
