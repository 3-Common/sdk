name: create contact — happy path
call:
  resource: contacts
  method: create
  args:
    body:
      email: alex@example.com
      firstName: Alex
      lastName: Garcia
expectedRequest:
  method: POST
  path: /v1/contacts
  body:
    email: alex@example.com
    firstName: Alex
    lastName: Garcia
  headers:
    authorization: 'Bearer 3co_test'
    content-type: application/json
mockResponse:
  status: 200
