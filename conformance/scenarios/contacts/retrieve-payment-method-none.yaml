# A contact with no saved card returns `data: null`. The SDK must surface this
# as a null/None/nil result, NOT throw — so this scenario asserts only the
# request shape and that the (null) body deserializes without error. There is no
# `expectedResult` because the top-level result is null and cannot be
# subset-matched; an SDK that crashes on null `data` fails by throwing.
name: retrieve contact payment method — none on file (null)
call:
  resource: contacts
  method: retrievePaymentMethod
  args:
    id: cnt_nocard
expectedRequest:
  method: GET
  path: /v1/contacts/cnt_nocard/payment-methods
  headers:
    authorization: 'Bearer 3co_test'
mockResponse:
  status: 200
  headers:
    x-request-id: req-cnt-pm-retrieve-none-001
  body:
    data: null
