name: create price — happy path (recurring with feature grant)
call:
  resource: prices
  method: create
  args:
    body:
      productId: prod_7
      type: recurring
      currency: USD
      unitAmount: 1500
      recurring:
        interval: month
        intervalCount: 1
      features:
        - featureKey: api_calls
          type: quantity
          quantity: 1000
          rolloverEnabled: false
expectedRequest:
  method: POST
  path: /v1/prices
  body:
    productId: prod_7
    type: recurring
    currency: USD
    unitAmount: 1500
    recurring:
      interval: month
      intervalCount: 1
    features:
      - featureKey: api_calls
        type: quantity
        quantity: 1000
        rolloverEnabled: false
  headers:
    authorization: 'Bearer 3co_test'
    content-type: application/json
mockResponse:
  status: 201
  headers:
    x-request-id: req-price-create-001
  body:
    data:
      id: price_new
      productId: prod_7
      type: recurring
      currency: USD
      unitAmount: 1500
      active: true
      createdAt: '2026-05-25T00:00:00.000Z'
      updatedAt: '2026-05-25T00:00:00.000Z'
expectedResult:
  id: price_new
  type: recurring
  active: true
