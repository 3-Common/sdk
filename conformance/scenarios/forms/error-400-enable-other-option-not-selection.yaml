name: 400 Validation - enable "other" option on a non-selection element
call:
  resource: forms
  method: enableOtherOption
  args:
    id: frm_123
    elementId: elm_text
    body:
      otherPrompt: Other (please specify)
client:
  maxRetries: 0
expectedRequest:
  method: PUT
  path: /v1/forms/frm_123/elements/elm_text/other-option
  body:
    otherPrompt: Other (please specify)
mockResponse:
