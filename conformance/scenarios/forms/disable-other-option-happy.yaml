name: disable "other" option on selection element - happy path
call:
  resource: forms
  method: disableOtherOption
  args:
    id: frm_123
    elementId: elm_1
expectedRequest:
  method: DELETE
  path: /v1/forms/frm_123/elements/elm_1/other-option
  headers:
    authorization: 'Bearer 3co_test'
  headersAbsent:
    - content-type
mockResponse:
  status: 200
  headers:
    x-request-id: req-frm-disable-other-001
  body:
    data:
      id: elm_1
      prompt: How did you hear about us?
      type: 'Select One'
      required: true
expectedResult:
  id: elm_1
  type: 'Select One'
