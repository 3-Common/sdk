name: auto-paginate walks every page of forms
call:
  resource: forms
  method: listAutoPaginate
  args:
    type: standalone
exchanges:
  - request:
      method: GET
      path: /v1/forms
      query:
        type: standalone
        page: '0'
    response:
      status: 200
      body:
        # List always returns the full summary projection (id, name,
        # numElements, type, status); under-specifying it would let an SDK that
        # drops or requires those fields pass or fail inconsistently.
        data:
          - id: frm_1
            name: First
            numElements: 2
            type: standalone
            status: active
          - id: frm_2
            name: Second
            numElements: 0
            type: standalone
            status: draft
        hasMore: true
  - request:
      method: GET
      path: /v1/forms
      query:
        type: standalone
        page: '1'
    response:
      status: 200
      body:
        data:
          - id: frm_3
            name: Third
            numElements: 5
            type: standalone
            status: active
        hasMore: false
expectedAutoPaginated:
  - id: frm_1
    name: First
    status: active
  - id: frm_2
    name: Second
    status: draft
  - id: frm_3
    name: Third
    status: active
expectedCallCount: 2
