name: enable "other" option on selection element - happy path
call:
  resource: forms
  method: enableOtherOption
  args:
    id: frm_123
    elementId: elm_1
    body:
      otherPrompt: Other (please specify)
expectedRequest:
  method: PUT
  path: /v1/forms/frm_123/elements/elm_1/other-option
  body:
    otherPrompt: Other (please specify)
  headers:
    authorization: 'Bearer 3co_test'
    content-type: application/json
mockResponse:
  status: 200
