    x-request-id: req-frm-enable-other-001
  body:
    data:
      id: elm_1
      prompt: How did you hear about us?
      type: 'Select One or "Other"'
      required: true
      otherPrompt: Other (please specify)
expectedResult:
  id: elm_1
  type: 'Select One or "Other"'
  otherPrompt: Other (please specify)
