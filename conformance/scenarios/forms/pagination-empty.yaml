name: auto-paginate returns no items when first page is empty
call:
  resource: forms
  method: listAutoPaginate
  args:
    type: order
expectedRequest:
  method: GET
  path: /v1/forms
  query:
    type: order
    page: '0'
mockResponse:
  status: 200
  body:
    data: []
    hasMore: false
expectedAutoPaginated: []
expectedCallCount: 1
