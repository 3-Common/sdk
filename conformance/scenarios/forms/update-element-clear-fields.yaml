name: update element - explicit null clears a setting
# Pins that an explicit JSON null in the body survives to the wire (the API's
# "clear this setting" signal). An SDK that drops None/null fields on serialize,
# or cannot represent an explicit null, sends a smaller body and fails the exact
# body assertion. The set-but-non-null `prompt` must coexist with the nulls.
call:
  resource: forms
  method: updateElement
  args:
    id: frm_123
    elementId: elm_1
    body:
      prompt: Updated prompt
      helperText: null
      placeholder: null
expectedRequest:
  method: PATCH
  path: /v1/forms/frm_123/elements/elm_1
  body:
    prompt: Updated prompt
    helperText: null
    placeholder: null
  headers:
    authorization: 'Bearer 3co_test'
    content-type: application/json
mockResponse:
  status: 200
  headers:
    x-request-id: req-frm-update-element-clear-001
  body:
    data:
      id: elm_1
      prompt: Updated prompt
      type: Text
      required: true
expectedResult:
  id: elm_1
  prompt: Updated prompt
