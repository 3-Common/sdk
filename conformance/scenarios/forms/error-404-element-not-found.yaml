name: 404 Not Found - element missing on delete
call:
  resource: forms
  method: deleteElement
  args:
    id: frm_123
    elementId: elm_missing
client:
  maxRetries: 0
expectedRequest:
  method: DELETE
  path: /v1/forms/frm_123/elements/elm_missing
mockResponse:
  status: 404
  headers:
    x-request-id: req-forms-404-002
  body:
    error:
      code: not_found
      message: Element elm_missing not found on form frm_123
expectedError:
  type: ThreeCommonNotFoundError
  code: not_found
  httpStatus: 404
  requestId: req-forms-404-002
