name: 404 Not Found - element missing on update
call:
  resource: forms
  method: updateElement
  args:
    id: frm_123
    elementId: elm_missing
    body:
      prompt: New prompt
client:
  maxRetries: 0
expectedRequest:
  method: PATCH
  path: /v1/forms/frm_123/elements/elm_missing
  body:
    prompt: New prompt
mockResponse:
  status: 404
  headers:
    x-request-id: req-frm-404-002
  body:
    error:
      code: not_found
      message: Element elm_missing not found on form frm_123
expectedError:
  type: ThreeCommonNotFoundError
  code: not_found
  httpStatus: 404
  requestId: req-frm-404-002
