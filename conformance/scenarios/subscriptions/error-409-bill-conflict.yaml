name: 409 Conflict — bill already-billed period
call:
  resource: subscriptions
  method: bill
  args:
    id: sub_already_billed
client:
  maxRetries: 0
expectedRequest:
  method: POST
  path: /v1/subscriptions/sub_already_billed/bill
mockResponse:
  status: 409
  headers:
    x-request-id: req-sub-409-001
  body:
    error:
      code: subscription_already_billed
