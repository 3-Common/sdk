        currentPeriodEnd: '2026-06-01T00:00:00.000Z'
expectedError:
  type: ThreeCommonConflictError
  code: subscription_already_billed
  httpStatus: 409
  requestId: req-sub-409-001
  details:
    currentPeriodEnd: '2026-06-01T00:00:00.000Z'
